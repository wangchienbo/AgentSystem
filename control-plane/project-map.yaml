project:
  id: agentsystem
  name: AgentSystem
  root: /root/project/AgentSystem
  anchor: /root/project/AgentSystem/PROJECT_CONTROL.md
  master_control_skill:
    id: agentsystem-master-control
    path: /root/project/AgentSystem/skills/generated/agentsystem-master-control/SKILL.md
  focus: project-bootstrap-control
  status: active

scopes:
  - id: platform-core
    kind: project-domain
    purpose: Core app-os substrate, contracts, registry, lifecycle, runtime, persistence, and platform governance foundations.
    owners:
      - agent
  - id: runtime-and-control-plane
    kind: project-domain
    purpose: Runtime host, scheduler, supervisor, interaction gateway, control-plane reads, and operator intervention surfaces.
    owners:
      - agent
  - id: skill-evolution-toolchain
    kind: project-domain
    purpose: Experience, skill suggestion, generated skill flows, executable skills, review, acceptance, rollback, and governance-aware skill growth.
    owners:
      - agent
  - id: telemetry-evidence-governance
    kind: project-domain
    purpose: Telemetry, upgrade evidence, refinement governance, risk governance, operator dashboards, and review surfaces.
    owners:
      - agent

dependencies:
  - from: runtime-and-control-plane
    to: platform-core
    kind: depends-on
  - from: skill-evolution-toolchain
    to: platform-core
    kind: depends-on
  - from: telemetry-evidence-governance
    to: platform-core
    kind: depends-on
  - from: skill-evolution-toolchain
    to: telemetry-evidence-governance
    kind: depends-on

artifacts:
  modules_dir: /root/project/AgentSystem/control-plane/modules
  interfaces_dir: /root/project/AgentSystem/control-plane/interfaces
  tasks_dir: /root/project/AgentSystem/control-plane/tasks
