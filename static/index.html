<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AgentSystem 龙虾系统</title>
    <style>
        :root {
            --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0;
            --text: #111111; --accent: #6c5ce7; --accent-light: #a29bfe;
            --error: #e74c3c; --success: #27ae60;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; }

        /* ── Loading ── */
        #loadingScreen { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
        #loadingScreen .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Login ── */
        #loginScreen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
        #loginScreen h2 { color: var(--accent); margin-bottom: 24px; font-size: 20px; }
        .login-box { background: var(--surface); border-radius: 12px; padding: 24px; width: 100%; max-width: 320px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .login-box input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; }
        .login-box input:focus { outline: none; border-color: var(--accent); }
        .login-box button { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .login-box button:hover { background: var(--accent-light); }
        #loginMsg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 18px; }
        .loginMsg-error { color: var(--error); }
        .loginMsg-info { color: #666; }

        /* ── Chat ── */
        #chatScreen { display: none; flex: 1; flex-direction: column; }
        #chatHeader { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
        #chatHeader .title { font-weight: 600; color: var(--accent); font-size: 15px; }
        #chatHeader .user-info { font-size: 12px; color: #888; }
        #headerActions { display: flex; gap: 8px; }
        #headerActions button { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #666; }
        #headerActions button:hover { background: var(--bg); }

        #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-user { align-self: flex-end; align-items: flex-end; }
        .msg-assistant { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 8px 12px; border-radius: 14px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
        .user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; color: #aaa; margin-top: 2px; padding: 0 4px; }

        /* Thinking indicator */
        .thinking { display: flex; align-items: center; gap: 6px; color: #888; font-size: 13px; padding: 8px 12px; }
        .thinking .dot { width: 6px; height: 6px; background: #aaa; border-radius: 50%; animation: bounce 1.2s infinite; }
        .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-4px); } }

        #inputBar { background: var(--surface); border-top: 1px solid var(--border); padding: 8px 12px; display: flex; gap: 8px; align-items: flex-end; }
        #inputBox { flex: 1; resize: none; border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 14px; line-height: 1.4; max-height: 120px; font-family: inherit; }
        #inputBox:focus { outline: none; border-color: var(--accent); }
        #sendBtn { background: var(--accent); color: #fff; border: none; border-radius: 20px; width: 48px; height: 36px; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        #sendBtn:hover { background: var(--accent-light); }
        #sendBtn:disabled { background: #ccc; cursor: not-allowed; }

        /* Error toast */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--error); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="spinner"></div>
    <span style="color:#888;font-size:13px">加载中...</span>
</div>

<div id="loginScreen">
    <h2>🦞 AgentSystem</h2>
    <div class="login-box">
        <input type="text" id="username" placeholder="用户名" autocomplete="username" />
        <input type="password" id="password" placeholder="密码" autocomplete="current-password" />
        <button id="loginBtn">登录</button>
        <div id="loginMsg"></div>
    </div>
</div>

<div id="chatScreen">
    <div id="chatHeader">
        <div>
            <div class="title">🦞 AgentSystem</div>
            <div class="user-info" id="userDisplay"></div>
        </div>
        <div id="headerActions">
            <button id="clearBtn" title="清空对话">🗑 清空</button>
            <button id="logoutBtn">退出</button>
        </div>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
        <textarea id="inputBox" rows="1" placeholder="输入消息，按 Enter 发送..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let sessionId = null;
let username = null;
let sending = false;

// ── Init: check existing session ───────────────────────────────────────────
(async function init() {
    try {
        // 尝试从 cookie 恢复会话
        const resp = await fetch('/api/sessions', { credentials: 'include' });
        if (resp.ok) {
            const data = await resp.json();
            if (data.success && data.sessions && data.sessions.length > 0) {
                // 已有活跃会话，恢复它
                sessionId = data.sessions[0].session_id;
                username = data.sessions[0].username;
                await loadHistory();
                showChat();
                return;
            }
        }
    } catch(e) {
        console.warn('Session restore failed:', e);
    }
    showLogin();
})();

// ── Auth ────────────────────────────────────────────────────────────────────
document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('password').onkeydown = e => { if(e.key === 'Enter') doLogin(); };

async function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const msg = document.getElementById('loginMsg');
    if (!u) { msg.className = 'loginMsg-error'; msg.textContent = '请输入用户名'; return; }

    msg.className = 'loginMsg-info'; msg.textContent = '登录中...';
    try {
        const resp = await fetch('/login', {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`
        });
        const data = await resp.json();
        if (data.success) {
            sessionId = data.session_id;
            username = data.username;
            msg.className = 'loginMsg-info'; msg.textContent = '登录成功，加载中...';
            // 渲染登录返回的历史记录
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';
            if (data.history && Array.isArray(data.history)) {
                data.history.forEach(h => {
                    if (h.role === 'user') appendBubble('user', escHtml(h.content), h.timestamp);
                    else appendBubble('assistant', h.content, h.timestamp);
                });
            }
            scrollBottom();
            showChat();
        } else {
            msg.className = 'loginMsg-error'; msg.textContent = data.error || '登录失败';
        }
    } catch(e) {
        msg.className = 'loginMsg-error'; msg.textContent = '网络错误';
    }
}

// ── History ─────────────────────────────────────────────────────────────────
async function loadHistory() {
    if (!sessionId) return;
    try {
        const resp = await fetch(`/api/sessions/${sessionId}/history`, { credentials: 'include' });
        if (resp.ok) {
            const data = await resp.json();
            if (data.success && data.history) {
                // 清空并重放历史
                const msgs = document.getElementById('messages');
                msgs.innerHTML = '';
                data.history.forEach(h => {
                    if (h.role === 'user') appendBubble('user', escHtml(h.content), h.timestamp);
                    else appendBubble('assistant', h.content, h.timestamp);
                });
                scrollBottom();
            }
        }
    } catch(e) { console.warn('History load failed:', e); }
}

// ── Chat ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
    const text = document.getElementById('inputBox').value.trim();
    if (!text || sending) return;
    sending = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('inputBox').value = '';
    autoResize(document.getElementById('inputBox'));

    appendBubble('user', escHtml(text));
    showThinking();

    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text, session_id: sessionId })
        });
        removeThinking();
        if (resp.ok) {
            const data = await resp.json();
            if (data.success) {
                appendBubble('assistant', data.response);
            } else {
                appendBubble('assistant', `<span style="color:var(--error)">错误: ${escHtml(data.error || '未知错误')}</span>`);
            }
        } else {
            appendBubble('assistant', `<span style="color:var(--error)">HTTP ${resp.status}</span>`);
        }
    } catch(e) {
        removeThinking();
        appendBubble('assistant', `<span style="color:var(--error)">请求异常: ${e.message}</span>`);
    }
    sending = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('inputBox').focus();
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function showLogin() {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
}
function showChat() {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'flex';
    document.getElementById('userDisplay').textContent = username ? `用户: ${username}` : '';
}

function appendBubble(role, html, timestamp) {
    const msgs = document.getElementById('messages');
    const w = document.createElement('div');
    w.className = `msg-wrapper msg-${role}`;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerHTML = html;
    const t = document.createElement('div');
    t.className = 'msg-time';
    t.textContent = timestamp ? new Date(timestamp).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}) : timeStr();
    w.appendChild(b);
    w.appendChild(t);
    msgs.appendChild(w);
    scrollBottom();
}

function showThinking() {
    const msgs = document.getElementById('messages');
    const w = document.createElement('div');
    w.className = 'msg-wrapper msg-assistant';
    w.id = 'thinkingEl';
    w.innerHTML = '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>思考中...</span></div>';
    msgs.appendChild(w);
    scrollBottom();
}
function removeThinking() {
    const el = document.getElementById('thinkingEl');
    if (el) el.remove();
}

function scrollBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
}
function timeStr() {
    return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
}
function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Header actions ────────────────────────────────────────────────────────────
document.getElementById('clearBtn').onclick = () => {
    if (confirm('确定清空当前对话？')) {
        document.getElementById('messages').innerHTML = '';
    }
};
document.getElementById('logoutBtn').onclick = async () => {
    await fetch('/logout', { credentials: 'include' });
    document.cookie = 'session_id=; Max-Age=0';
    location.reload();
};
</script>
</body>
</html>
