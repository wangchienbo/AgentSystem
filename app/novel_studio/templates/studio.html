<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小说创作室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;height:100vh;overflow:hidden;color:#222;touch-action:manipulation}
#app{display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;padding:10px 16px;background:#1a1a2e;color:#fff;gap:12px;flex-shrink:0}
.hamburger{cursor:pointer;font-size:22px;padding:4px 6px;border-radius:4px;user-select:none;background:transparent;border:none;color:#fff}
.hamburger:hover{background:rgba(255,255,255,.1)}
#topbar h2{flex:1;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tb-genre{font-size:12px;color:#aaa;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:10px}
.top-actions{display:flex;gap:6px}
.top-actions button,.back-btn{cursor:pointer;background:#e94560;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px}
.back-btn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;font-size:13px;cursor:pointer}
.back-btn:hover{background:rgba(255,255,255,.1)}
.top-actions button:hover{background:#d63851}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:280px;min-width:280px;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;transition:width .3s,min-width .3s,opacity .3s}
#sidebar.collapsed{width:0;min-width:0;overflow:hidden;opacity:0}
.sidebar-section{padding:12px 14px}
.sidebar-section h3{font-size:14px;margin-bottom:8px;color:#333}
.tree-item{cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;font-size:13px;color:#444;margin:1px 0}
.tree-item:hover{background:#e8f0fe;color:#1a73e8}
.tree-item .dot{width:6px;height:6px;border-radius:50%;background:#e94560;flex-shrink:0}
.tree-item.active{background:#e8f0fe;color:#1a73e8}
.tree-item .ch-title{flex:1;cursor:pointer}
.tree-item .ch-actions{display:none;gap:2px}
.tree-item:hover .ch-actions{display:flex}
.ch-btn{background:none;border:none;cursor:pointer;padding:0 4px;font-size:12px;color:#999;line-height:1}
.ch-btn:hover{color:#e94560}
.ch-btn.edit:hover{color:#1a73e8}
.detail-actions{display:flex;gap:6px;margin-left:auto}
.detail-btn{background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:#555}
.detail-btn:hover{background:#f0f0f0}
.detail-btn.edit:hover{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8}
.detail-btn.delete:hover{background:#fee;color:#e94560;border-color:#e94560}
.empty-hint{color:#999;font-size:13px;padding:6px 8px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#chat-area{flex:1;overflow-y:auto;padding:16px 20px;background:#f8f9fb}
#chat-msgs{max-width:700px;margin:0 auto}
.empty{text-align:center;padding:60px 20px;color:#666}
.empty .icon{font-size:48px;margin-bottom:16px}
.q-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.q-btn{padding:8px 16px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;color:#333}
.q-btn:hover{background:#e8f0fe;border-color:#1a73e8;color:#1a73e8}
.msg{margin:8px 0;padding:10px 14px;border-radius:12px;line-height:1.6;font-size:14px;white-space:pre-wrap;max-width:85%}
.msg.user{background:#1a73e8;color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg.ai{background:#fff;border:1px solid #e0e0e0;border-bottom-left-radius:4px}
.msg.system{text-align:center;font-size:12px;color:#999;padding:6px}
.msg.ai.typing{color:#888;font-style:italic}
.ch-tag{display:inline-block;background:#e8f5e9;color:#2e7d32;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:6px}
#input-area{display:flex;padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0;gap:8px;flex-shrink:0}
#chat-input{flex:1;border:1px solid #ddd;border-radius:20px;padding:10px 16px;font-size:14px;outline:none;resize:none;font-family:inherit;min-height:20px;max-height:80px}
#chat-input:focus{border-color:#1a73e8}
#send-btn{background:#1a73e8;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:14px;cursor:pointer;white-space:nowrap}
#send-btn:disabled{opacity:.5;cursor:not-allowed}
#gen-btn{background:#e94560;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:14px;cursor:pointer;white-space:nowrap}
#gen-btn:disabled{opacity:.5;cursor:not-allowed}
#detail-view{display:none;flex-direction:column;height:100%;background:#f8f9fb}
#detail-view.active{display:flex}
#detail-view .detail-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #e0e0e0}
#detail-view .detail-header button{background:transparent;border:1px solid #ddd;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:#666}
#detail-view .detail-body{flex:1;overflow-y:auto;padding:20px;max-width:700px;margin:0 auto;width:100%;font-size:14px;line-height:1.7;white-space:pre-wrap}
#list-view{display:flex;flex-direction:column;height:100%}
#list-view .view-inner{flex:1;overflow-y:auto;padding:20px 30px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;padding:20px 0}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:16px;cursor:pointer;transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
.card h3{font-size:16px;margin-bottom:6px;color:#222}
.card .cm{font-size:13px;color:#666;display:flex;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:400px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.modal h3{font-size:18px;margin-bottom:16px}
.modal label{display:block;margin-top:12px;font-size:13px;color:#555}
.modal input,.modal textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-top:4px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus{border-color:#1a73e8}
.modal textarea{min-height:60px;resize:vertical}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal .modal-actions button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.modal .modal-actions .cancel{background:#eee;color:#333}
.modal .modal-actions .confirm{background:#1a73e8;color:#fff}
.view{display:none;flex:1}
.view.active{display:flex;flex-direction:column;flex:1}
#loading-overlay{display:none;position:fixed;inset:0;z-index:999;background:#f0f2f5;flex-direction:column;align-items:center;justify-content:center;font-size:16px;color:#333}
#loading-overlay.show{display:flex}
#loading-overlay .spin{width:36px;height:36px;border:3px solid #ddd;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* ========== Reader View ========== */
#reader-view{display:none;flex-direction:column;height:100%}
#reader-view.active{display:flex}
#reader-topbar{display:flex;align-items:center;padding:10px 16px;background:#1a1a2e;color:#fff;gap:12px;flex-shrink:0}
#reader-topbar .rtitle{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
#reader-topbar .rsub{font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#reader-topbar .close-btn{background:transparent;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;font-size:13px;cursor:pointer;color:#fff;margin-left:auto}
#reader-topbar .close-btn:hover{background:rgba(255,255,255,.1)}
#reader-body{display:flex;flex:1;overflow:hidden;background:#f5f3ef}
#reader-toc{width:260px;min-width:260px;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;padding:10px 0;transition:width .3s,min-width .3s,opacity .3s}
#reader-toc.collapsed{width:0;min-width:0;overflow:hidden;opacity:0}
#reader-toc .toc-title{padding:8px 16px;font-size:13px;color:#999;font-weight:600;letter-spacing:.5px}
#reader-toc .toc-item{cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:14px;color:#444;border-left:3px solid transparent;transition:all .15s}
#reader-toc .toc-item:hover{background:#f0f0f0;color:#1a73e8}
#reader-toc .toc-item .toc-num{color:#999;font-size:12px;min-width:24px;text-align:right;flex-shrink:0}
#reader-toc .toc-item .toc-title-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#reader-toc .toc-item .toc-wc{color:#bbb;font-size:11px;margin-left:auto;flex-shrink:0}
#reader-toc .toc-item.active{background:#e8f0fe;color:#1a73e8;border-left-color:#1a73e8;font-weight:600}
#reader-toc .toc-empty{padding:40px 20px;text-align:center;color:#999;font-size:14px}
#reader-content{flex:1;overflow-y:auto;padding:30px 40px 60px;max-width:720px;margin:0 auto;width:100%}
#reader-content .rc-header{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #e0ddd5}
#reader-content .rc-title{font-size:26px;font-weight:700;color:#1a1a2e;line-height:1.3;margin-bottom:8px}
#reader-content .rc-meta{font-size:13px;color:#999;display:flex;gap:16px}
#reader-content .rc-body{font-size:17px;line-height:1.9;color:#2c2c2c;white-space:pre-wrap;letter-spacing:.3px}
#reader-content .rc-body p{text-indent:2em;margin-bottom:8px}
#reader-content .rc-empty{text-align:center;padding:80px 20px;color:#999;font-size:16px}
#reader-nav{display:flex;align-items:center;justify-content:center;padding:12px 20px;background:#fff;border-top:1px solid #e0e0e0;gap:12px;flex-shrink:0}
#reader-nav button{padding:8px 24px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#333;transition:all .15s}
#reader-nav button:hover:not(:disabled){background:#1a73e8;color:#fff;border-color:#1a73e8}
#reader-nav button:disabled{opacity:.3;cursor:not-allowed}
#reader-nav .rn-info{font-size:13px;color:#999;min-width:120px;text-align:center}
#reader-nav .rn-progress{font-size:13px;color:#666;text-align:center}
.read-btn{background:#34a853!important;color:#fff!important;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer}
.read-btn:hover{background:#2d9248!important}

/* Mobile: reader TOC as overlay */
@media(max-width:768px){
  #reader-toc{position:fixed;top:50px;left:0;bottom:56px;width:280px;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,.15)}
  #reader-toc.collapsed{width:0;min-width:0}
  #reader-content{padding:20px;max-width:100%}
  #reader-content .rc-title{font-size:22px}
  #reader-content .rc-body{font-size:16px;line-height:1.8}
  #reader-topbar .rtitle{max-width:160px}
}

/* Mobile existing overrides */
@media(max-width:768px){
  #sidebar{position:fixed;top:50px;left:0;bottom:0;width:280px;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,.15)}
  #sidebar.collapsed{width:0;min-width:0}
  #main{width:100%;max-width:100%;overflow-x:hidden}
  .grid{grid-template-columns:1fr}
  .msg{max-width:95%}
  #tb-genre{display:none}
}
</style>
</head>
<body>
<div id="app">
  <div id="list-view" class="view active">
    <div id="topbar">
      <h2>📖 小说创作室</h2>
      <div class="top-actions">
        <button onclick="showCreate()">+ 新建</button>
      </div>
    </div>
    <div class="view-inner">
      <div class="grid" id="novel-grid"><div style="color:#666;grid-column:1/-1;text-align:center;padding:60px">加载中...</div></div>
    </div>
  </div>

  <div id="workspace" class="view">
    <div id="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span id="tb-title">加载中...</span>
      <span id="tb-genre"></span>
      <div style="flex:1"></div>
      <div class="top-actions">
        <button class="read-btn" onclick="openReader()">📖 阅读</button>
        <button class="back-btn" onclick="showList()">← 返回</button>
      </div>
    </div>
    <div id="body">
      <div id="sidebar">
        <div class="sidebar-section"><h3>📚 章节</h3><div class="empty-hint">加载中...</div></div>
      </div>
      <div id="main">
        <div id="chat-area">
          <div id="chat-msgs"><div class="empty"><div class="icon">⏳</div><p>加载中...</p></div></div>
        </div>
        <div id="input-area">
          <textarea id="chat-input" placeholder="输入创作指令..." disabled></textarea>
          <button id="gen-btn" onclick="genNextChapter()" disabled>⚡ 生成下一章</button>
          <button id="send-btn" onclick="sendMsg()" disabled>发送</button>
        </div>
      </div>
      <div id="detail-view">
        <div class="detail-header">
          <button onclick="hideDetail()">← 返回聊天</button>
          <span id="detail-title" style="font-weight:600"></span>
          <span id="detail-actions" class="detail-actions"></span>
        </div>
        <div class="detail-body" id="detail-body"></div>
      </div>
    </div>
  </div>

  <!-- ====== Reader View ====== -->
  <div id="reader-view" class="view">
    <div id="reader-topbar">
      <button class="hamburger" onclick="toggleReaderToc()">☰</button>
      <span class="rtitle" id="reader-title">加载中...</span>
      <span class="rsub" id="reader-subtitle"></span>
      <button class="close-btn" onclick="closeReader()">✕ 关闭阅读</button>
    </div>
    <div id="reader-body">
      <div id="reader-toc">
        <div class="toc-title">📖 目录</div>
        <div id="reader-toc-list"><div class="toc-empty">暂无章节</div></div>
      </div>
      <div id="reader-content">
        <div class="rc-empty">选择章节开始阅读</div>
      </div>
    </div>
    <div id="reader-nav">
      <button id="prev-ch-btn" onclick="prevChapter()" disabled>← 上一章</button>
      <span class="rn-progress" id="reader-progress">0 / 0</span>
      <button id="next-ch-btn" onclick="nextChapter()" disabled>下一章 →</button>
    </div>
  </div>
</div>  <!-- end #app -->

<div id="loading-overlay"><div class="spin"></div><p id="loading-text">加载中...</p></div>

<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h3>✍️ 新建小说</h3>
    <label>作品名称</label><input id="ctitle" placeholder="输入作品名称">
    <label>类型</label><input id="cgenre" placeholder="例如：奇幻、科幻、悬疑">
    <label>故事概述（可选）</label><textarea id="coutline" placeholder="简单描述故事方向..."></textarea>
    <div class="modal-actions">
      <button class="cancel" onclick="hideCreate()">取消</button>
      <button class="confirm" onclick="createNovel()">创建</button>
    </div>
  </div>
</div>

<script>
const API='/api/novel';
let cid=null,novelData=null,sidebarOpen=true;

function $(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function dbg(msg){
  var ts=new Date().toISOString().slice(11,19);
  fetch('/debug-log?msg='+encodeURIComponent(msg)+'&ts='+encodeURIComponent(ts));
  console.log('['+ts+'] '+msg);
}

async function api(path,body){
  try{
    const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
    return await r.json();
  }catch(e){return {error:e.message}}
}

// === View switching ===
function showView(id){
  // Toggle CSS classes for consistency with other code
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==id));
  // Also directly set style for reliability (QQ browser workaround)
  var views=document.querySelectorAll('.view');
  for(var i=0;i<views.length;i++){
    var v=views[i];
    if(v.id===id){
      v.style.display='flex';
    }else{
      v.style.display='none';
    }
  }
}

async function loadNovels(){
  const d=await api('/list');const grid=$('novel-grid');
  dbg('loadNovels: '+(d.novels?d.novels.length+' novels':'no novels'));
  if(!d.novels||!d.novels.length){grid.innerHTML='<div style="color:#666;grid-column:1/-1;text-align:center;padding:60px">还没有小说，点击右上角开始创作</div>';return}
  grid.innerHTML=d.novels.map(n=>`
    <div class="card" data-id="${esc(n.id)}" onclick="cardTap(event,'${esc(n.id)}')">
      <h3>${esc(n.title||'未命名')}</h3>
      <div class="cm"><span>📖 ${esc(n.genre||'未分类')}</span><span>👥 ${n.char_count||0}</span><span>📄 ${n.chapter_count||0}章</span></div>
      <div class="cm" style="margin-top:6px;color:#555">${esc(n.status||'草稿')} · ${(n.created_at||'').slice(0,10)}</div>
    </div>
  `).join('')
  dbg('cards rendered');
}

function cardTap(ev,id){
  dbg('cardTap: '+id);
  // Show loading overlay immediately (use direct style, most reliable)
  var ol=$('loading-overlay');
  $('loading-text').textContent='加载小说...';
  ol.style.display='flex';
  // Visual feedback on card
  var card=ev.currentTarget;
  card.style.transition='background .15s';
  card.style.background='#e8f0fe';
  setTimeout(function(){card.style.background=''},200);
  // Navigate
  enterNovel(id);
}

function enterNovel(id){
  dbg('enterNovel: '+id);
  cid=id;showView('workspace');
  $('chat-msgs').innerHTML='<div class="empty"><div class="icon">⏳</div><p>加载小说数据...</p></div>';
  $('chat-input').disabled=true;$('send-btn').disabled=true;$('gen-btn').disabled=true;
  // Auto-collapse sidebar on mobile
  if(window.innerWidth<768){sidebarOpen=false;document.getElementById('sidebar').classList.add('collapsed')}
  loadNovelData(id);
}

async function loadNovelData(id){
  dbg('loadNovelData start');
  const d=await api('/get',{novel_id:id});
  if(!d.success||!d.novel){$('chat-msgs').innerHTML='<div class="empty"><div class="icon">❌</div><p>加载失败: 未找到该小说</p></div>';$('loading-overlay').style.display='none';dbg('loadNovelData FAIL: '+id);return}
  novelData=d.novel;
  $('tb-title').textContent=novelData.title||'未命名';
  $('tb-genre').textContent=novelData.genre||'';
  buildSidebar();
  // Welcome message
  $('chat-msgs').innerHTML=`<div class="empty"><div class="icon">📖</div><p>开始创作《${esc(novelData.title||'')}》<br>输入指令或选择快捷操作</p><div class="q-btns"><button class="q-btn" onclick="quick('帮我把故事大纲写好')">生成大纲</button><button class="q-btn" onclick="quick('写下一章')">写下一章</button><button class="q-btn" onclick="quick('列出所有角色和他们的关系')">查看角色</button></div></div>`;
  $('chat-input').disabled=false;$('send-btn').disabled=false;$('gen-btn').disabled=false;
  // Hide loading overlay
  $('loading-overlay').style.display='none';
  dbg('loadNovelData DONE: '+id);
}

function buildSidebar(){
  const s=$('sidebar');
  const nd=novelData;
  if(!nd){s.innerHTML='<div class="sidebar-section"><h3>📚 章节</h3><div class="empty-hint">暂无数据</div></div>';return}
  
  let html='';
  // === Chapters ===
  html+='<div class="sidebar-section"><h3>📚 章节</h3>';
  const chs=nd.chapters||[];
  if(chs.length){
    chs.forEach((ch,i)=>{
      const t=esc(ch.title||'第'+(i+1)+'章');
      const cid=ch.id||'';
      html+=`<div class="tree-item chapter" data-idx="${i}">
        <span class="dot" onclick="showDetail('chapter',${i})"></span>
        <span class="ch-title" onclick="showDetail('chapter',${i})">${t}</span>
        <span class="ch-actions">
          <button onclick="event.stopPropagation();deleteChapter('${cid}',${ch.number})" class="ch-btn" title="删除章节">✕</button>
        </span>
      </div>`;
      // scenes from outline
      const oc=nd.outline&&nd.outline.chapters&&nd.outline.chapters[i];
      if(oc&&oc.key_events&&oc.key_events.length){
        (oc.key_events||[]).forEach((ev,evi)=>html+=`<div class="tree-item sub" style="padding-left:28px" onclick="showDetail('event','${i}:${evi}')">  🎬 ${esc(ev)}</div>`);
      }
    });
  }else{
    html+='<div class="empty-hint">暂无章节</div>';
  }
  html+='</div>';

  // === Characters ===
  html+='<div class="sidebar-section"><h3>👥 角色</h3>';
  const rawChars=nd.characters||{};
  const chars=Array.isArray(rawChars)?rawChars:Object.values(rawChars);
  if(chars.length){
    chars.forEach((ch,i)=>{
      const name=typeof ch==='string'?ch:(ch.name||ch.role||'角色'+(i+1));
      const role=typeof ch==='string'?'':(ch.role||ch.archetype?'('+esc(ch.role||ch.archetype||'')+')':'');
      html+=`<div class="tree-item sub" onclick="showDetail('character',${i})">  👤 ${esc(name)}${role}</div>`;
    });
  }else{
    html+='<div class="empty-hint">暂无角色</div>';
  }
  html+='</div>';

  // === World ===
  html+='<div class="sidebar-section"><h3>🌍 世界观</h3>';
  const w=nd.world||{};
  if(w.name||w.overview){
    html+=`<div class="tree-item sub" onclick="showDetail('world',0)">  🌏 ${esc(w.name||'世界')}</div>`;
    const scenes=w.scenes||{};
    const sceneEntries=typeof scenes==='object'&&!Array.isArray(scenes)?Object.entries(scenes):Array.isArray(scenes)?scenes.map((s,i)=>[i,s]):[];
    if(sceneEntries.length){
      sceneEntries.slice(0,5).forEach(([sk,sc])=>{
        html+=`<div class="tree-item sub" style="padding-left:28px" onclick="showDetail('scene','${esc(sk)}')">  🏞️ ${esc(sc.title||sc.name||String(sk).slice(0,8))}</div>`;
      });
    }
  }else{
    html+='<div class="empty-hint">暂无世界观设定</div>';
  }
  html+='</div>';

  s.innerHTML=html;
}

function buildSubSection(label,arr){
  if(!arr||!arr.length) return '';
  let html='<div class="sidebar-section"><h3>'+label+'</h3>';
  arr.forEach((item,i)=>{
    const name=typeof item==='string'?item:(item.name||item.role||'项'+(i+1));
    html+=`<div class="tree-item sub"">  👤 ${esc(name)}</div>`;
  });
  return html+'</div>';
}

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen);
}

function showDetail(type,idx){
  if(!novelData) return;
  const dt=$('detail-title');const db=$('detail-body');const da=$('detail-actions');
  let title='',body='';
  if(type==='chapter'){
    const ch=(novelData.chapters||[])[idx];
    if(!ch){title='章节未找到';body='';}
    else{
      title=ch.title||'第'+(idx+1)+'章';
      body='📄 **'+title+'**\n\n'+(ch.content||'（内容待生成）');
      if(ch.word_count) body+='\n\n_字数：'+ch.word_count+'_';
      if(ch.status) body+='\n_状态：'+ch.status+'_';
      // Action buttons
      da.innerHTML=`
        <button class="detail-btn edit" onclick="editChapter('${ch.id||''}',${ch.number},'${esc(ch.title||'')}')">✏️ 编辑</button>
        <button class="detail-btn delete" onclick="deleteChapter('${ch.id||''}',${ch.number})">🗑️ 删除</button>
      `;
    }
  }else if(type==='character'){
    const rawChars=novelData.characters||{};
    const chars=Array.isArray(rawChars)?rawChars:Object.values(rawChars);
    const ch=chars[idx];
    if(!ch){title='角色未找到';body='';}
    else{
      if(typeof ch==='string'){title=ch;body='角色：'+ch;}
      else{title=ch.name||ch.role||'角色';
        body='角色信息：\n';
        if(ch.name)body+='名称：'+ch.name+'\n';
        if(ch.role)body+='角色：'+ch.role+'\n';
        if(ch.archetype)body+='类型：'+ch.archetype+'\n';
        if(ch.description||ch.desc)body+='描述：'+(ch.description||ch.desc)+'\n';
        if(ch.personality||ch.traits)body+='特点：'+(Array.isArray(ch.personality||ch.traits)?(ch.personality||ch.traits).join('、'):(ch.personality||ch.traits));
        if(ch.background)body+='\n背景：'+ch.background;}
    }
    da.innerHTML='';
  }else if(type==='world'){
    const w=novelData.world||{};
    title=w.name||'世界观';
    body='🌍 '+title+'\n\n';
    if(w.overview)body+='概述：'+w.overview+'\n\n';
    if(w.rules&&w.rules.length)body+='规则：\n'+w.rules.map(r=>'• '+r).join('\n');
    if(w.scenes){
      const ks=Object.keys(w.scenes);
      if(ks.length){body+='\n\n场景：\n';ks.forEach(k=>{const s=w.scenes[k];body+='• '+(s.title||s.name||k.slice(0,8))+'\n';});}
    }
    da.innerHTML='';
  }else if(type==='scene'){
    const scenes=novelData.world&&novelData.world.scenes||{};
    const sc=typeof scenes==='object'&&!Array.isArray(scenes)?scenes[idx]:null;
    if(sc){title=sc.title||sc.name||'场景';body=JSON.stringify(sc,null,2);}
    else{title='场景未找到';body='';}
    da.innerHTML='';
  }else if(type==='event'){
    const parts=idx.split(':');
    const ci=parseInt(parts[0]),ei=parseInt(parts[1]);
    const oc=novelData.outline&&novelData.outline.chapters&&novelData.outline.chapters[ci];
    const ev=oc&&oc.key_events&&oc.key_events[ei];
    if(ev){title='关键事件';body=ev;}
    else{title='事件未找到';body='';}
    da.innerHTML='';
  }
  dt.textContent=title;
  db.textContent=body;
  $('chat-area').style.display='none';
  $('detail-view').classList.add('active');
}

function hideDetail(){
  $('detail-view').classList.remove('active');
  $('chat-area').style.display='flex';
}

function showList(){
  hideDetail();novelData=null;
  showView('list-view');
}

function showCreate(){$('create-modal').classList.add('show');$('ctitle').focus()}
function hideCreate(){$('create-modal').classList.remove('show')}

async function createNovel(){
  const title=$('ctitle').value.trim();const genre=$('cgenre').value.trim();const outline=$('coutline').value.trim();
  if(!title){alert('请输入作品名称');return}
  const d=await api('/create',{title,genre,summary:outline});
  if(d.success&&d.novel_id){
    hideCreate();
    $('ctitle').value='';$('cgenre').value='';$('coutline').value='';
    enterNovel(d.novel_id);
  }else{alert('创建失败: '+(d.error||'未知错误'))}
}

let _msgId=0;
async function sendMsg(){
  const inp=$('chat-input');const text=inp.value.trim();
  if(!text||!cid)return;
  inp.value='';$('send-btn').disabled=true;$('gen-btn').disabled=true;inp.disabled=true;
  const msgs=$('chat-msgs');
  msgs.innerHTML+=`<div class="msg user">${esc(text)}</div>`;
  // Create AI message bubble that will be filled progressively (streaming)
  const mid='stream-msg-'+(++_msgId);
  msgs.innerHTML+=`<div class="msg ai" id="${mid}"></div>`;
  const msgDiv=document.getElementById(mid);
  msgs.scrollTop=msgs.scrollHeight;
  try{
    const response=await fetch(API+'/chat/stream',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({novel_id:cid,message:text})
    });
    if(!response.ok){
      const err=await response.json().catch(()=>({error:'HTTP '+response.status}));
      msgDiv.textContent='⚠️ '+(err.error||'请求失败');
      return;
    }
    // Check if streaming is supported
    if(!response.body){
      // Fallback: read full text as NDJSON (line-by-line parsing)
      const text=await response.text();
      const lines=text.split('\n');
      let fullText='',chapterInfo=null;
      for(const line of lines){
        if(!line.trim())continue;
        try{
          const data=JSON.parse(line);
          if(data.token) fullText+=data.token;
          else if(data.done) chapterInfo=data.chapter||null;
          else if(data.info && !fullText) msgDiv.textContent='⏳ '+data.info;
          else if(data.error){ msgDiv.textContent='⚠️ '+data.error; return; }
        }catch(e){/* skip malformed lines */}
      }
      msgDiv.textContent=fullText||'（模型暂无回复）';
      if(chapterInfo&&chapterInfo.number){
        var tag=document.createElement('span');tag.className='ch-tag';
        tag.textContent='📚 已保存为第'+chapterInfo.number+'章'+(chapterInfo.title?'「'+chapterInfo.title+'」':'');
        msgDiv.appendChild(tag);
        await loadNovelData(cid);
      }
      return;
    }
    // Streaming mode: parse NDJSON line by line
    const reader=response.body.getReader();
    const decoder=new TextDecoder();
    let buffer='',fullText='',chapterInfo=null;
    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop(); // keep trailing incomplete line in buffer
      for(const line of lines){
        if(!line.trim())continue;
        try{
          const data=JSON.parse(line);
          if(data.token){
            fullText+=data.token;
            msgDiv.textContent=fullText;
            msgs.scrollTop=msgs.scrollHeight;
          }else if(data.done){
            chapterInfo=data.chapter||null;
          }else if(data.info){
            // Show info message (e.g., retrying)
            if(!fullText)msgDiv.textContent='⏳ '+data.info;
          }else if(data.error){
            msgDiv.textContent='⚠️ '+data.error;
          }
        }catch(e){/* skip malformed lines */}
      }
    }
    // Add chapter tag if saved
    if(chapterInfo&&chapterInfo.number){
      var tag=document.createElement('span');tag.className='ch-tag';
      tag.textContent='📚 已保存为第'+chapterInfo.number+'章'+(chapterInfo.title?'「'+chapterInfo.title+'」':'');
      msgDiv.appendChild(tag);
    }
    if(chapterInfo&&chapterInfo.number)await loadNovelData(cid);
  }catch(e){
    msgDiv.textContent='⚠️ 请求失败: '+e.message;
  }
  $('send-btn').disabled=false;$('gen-btn').disabled=false;inp.disabled=false;inp.focus();
  msgs.scrollTop=msgs.scrollHeight;
}

async function genNextChapter(){
  if(!cid)return;
  $('gen-btn').disabled=true;$('send-btn').disabled=true;
  const msgs=$('chat-msgs');
  msgs.innerHTML+=`<div class="msg system">⚡ 开始生成下一章...</div>`;
  msgs.innerHTML+=`<div class="msg ai typing" id="typing-indicator">✍️ 生成中...</div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try{
    const d=await api('/generate',{novel_id:cid});
    const ti=$('typing-indicator');
    if(ti)ti.remove();
    if(d.success){
      const ch=d.chapter||{};
      const chTag=ch.number?'第'+ch.number+'章「'+(ch.title||'')+'」':'章节';
      msgs.innerHTML+=`<div class="msg system">✅ ${chTag} 生成成功！已保存</div>`;
      if(d.content){
        msgs.innerHTML+=`<div class="msg ai">${esc(d.content)}</div>`;
      }else{
        msgs.innerHTML+=`<div class="msg ai">（章节内容已保存，可在侧边栏查看）</div>`;
      }
      // Refresh sidebar
      await loadNovelData(cid);
    }else{
      msgs.innerHTML+=`<div class="msg system">❌ 生成失败: ${esc(d.error||'未知错误')}</div>`;
    }
  }catch(e){
    const ti=$('typing-indicator');
    if(ti)ti.remove();
    msgs.innerHTML+=`<div class="msg system">⚠️ 生成异常: ${e.message}</div>`;
  }
  $('gen-btn').disabled=false;$('send-btn').disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

function quick(q){
  $('chat-input').value=q;
  sendMsg();
}

// ====== Reader View ======
let readerCurrentIdx=0;
let readerTocOpen=true;

function openReader(){
  if(!novelData) return;
  hideDetail();
  showView('reader-view');
  // Auto-collapse TOC on mobile
  if(window.innerWidth<768){readerTocOpen=false;document.getElementById('reader-toc').classList.add('collapsed')}
  buildReaderToc();
  const chs=novelData.chapters||[];
  if(chs.length){loadChapter(0)}else{
    $('reader-title').textContent=novelData.title||'未命名';
    $('reader-subtitle').textContent='暂无章节';
    $('reader-content').innerHTML='<div class="rc-empty">📝 还没有章节，返回创作室开始写作吧</div>';
  }
  dbg('openReader: '+cid);
}

function closeReader(){
  showView('workspace');
  dbg('closeReader');
}

function buildReaderToc(){
  const chs=novelData&&novelData.chapters||[];
  const list=$('reader-toc-list');
  if(!chs.length){list.innerHTML='<div class="toc-empty">暂无章节</div>';return}
  list.innerHTML=chs.map((ch,i)=>{
    const num=i+1;
    const title=esc(ch.title||'第'+num+'章');
    const wc=ch.word_count?esc(String(ch.word_count)):'';
    const active= i===readerCurrentIdx?' active':'';
    return '<div class="toc-item'+active+'" onclick="loadChapter('+i+')">'+
      '<span class="toc-num">'+num+'</span>'+
      '<span class="toc-title-text">'+title+'</span>'+
      (wc?'<span class="toc-wc">'+wc+'字</span>':'')+
    '</div>';
  }).join('');
}

function loadChapter(idx){
  const chs=novelData&&novelData.chapters||[];
  if(idx<0||idx>=chs.length)return;
  readerCurrentIdx=idx;
  const ch=chs[idx];
  const num=idx+1;
  const title=ch.title||'第'+num+'章';
  
  // Update topbar
  $('reader-title').textContent=novelData.title||'未命名';
  $('reader-subtitle').textContent='第'+num+'章：'+title;
  
  // Update TOC active state
  document.querySelectorAll('#reader-toc .toc-item').forEach(el=>el.classList.remove('active'));
  const items=document.querySelectorAll('#reader-toc .toc-item');
  if(items[idx])items[idx].classList.add('active');
  
  // Build content
  const content=ch.content||'（内容待生成）';
  const wc=ch.word_count||'';
  const status=ch.status||'';
  const lines=content.split('\n').filter(l=>l.trim());
  const paragraphs=lines.map(l=>'<p>'+esc(l)+'</p>').join('');
  
  $('reader-content').innerHTML=
    '<div class="rc-header">'+
      '<div class="rc-title">第'+num+'章 '+esc(title)+'</div>'+
      '<div class="rc-meta">'+
        (wc?'<span>📝 '+wc+'字</span>':'')+
        (status?'<span>🏷️ '+esc(status)+'</span>':'')+
        '<span>📄 第'+num+'/'+chs.length+'章</span>'+
      '</div>'+
    '</div>'+
    '<div class="rc-body">'+
      (content?paragraphs:'<p>（内容待生成）</p>')+
    '</div>';
  
  // Update nav
  $('prev-ch-btn').disabled=(idx===0);
  $('next-ch-btn').disabled=(idx===chs.length-1);
  $('reader-progress').textContent=num+' / '+chs.length;
  
  // Scroll to top
  $('reader-content').scrollTop=0;
  
  dbg('loadChapter: '+idx+' ('+title+')');
}

function prevChapter(){
  loadChapter(readerCurrentIdx-1);
}

function nextChapter(){
  loadChapter(readerCurrentIdx+1);
}

function toggleReaderToc(){
  readerTocOpen=!readerTocOpen;
  document.getElementById('reader-toc').classList.toggle('collapsed',!readerTocOpen);
}

// ──── Chapter Management ────

async function deleteChapter(chapterId, chapterNumber){
  if(!chapterId && !chapterNumber) return;
  const msg = `确定删除第${chapterNumber}章吗？此操作不可撤销。`;
  if(!confirm(msg)) return;
  const d = await api('/chapter/delete', {
    novel_id: cid,
    chapter_number: chapterNumber
  });
  if(d.success){
    hideDetail();
    await    enterNovel(cid);
  } else {
    alert('删除失败：' + (d.error || '未知错误'));
  }
}

async function saveChapter(chapterId, chapterNumber){
  const title = $('edit-title').value.trim();
  const content = $('edit-content').value.trim();
  if(!title){alert('请输入章节标题');return}
  if(!content){alert('请输入章节内容');return}
  const d = await api('/chapter/update', {
    novel_id: cid,
    chapter_id: chapterId,
    title: title,
    content: content
  });
  if(d.success){
    await    enterNovel(cid);
  } else {
    alert('保存失败');
  }
}

function cancelEdit(){
  // Re-show the detail of the current chapter
  const da=$('detail-actions');
  da.innerHTML='';
  // Find which chapter was being edited
  const chs=novelData.chapters||[];
  for(let i=0;i<chs.length;i++){
    const ch=chs[i];
    if(ch.id===lastEditedChapterId || ch.number===lastEditedChapterNumber){
      showDetail('chapter',i);
      return;
    }
  }
  hideDetail();
}

let lastEditedChapterId='';
let lastEditedChapterNumber=0;

function editChapter(chapterId, chapterNumber, currentTitle){
  lastEditedChapterId=chapterId;
  lastEditedChapterNumber=chapterNumber;
  const ch = (novelData.chapters||[]).find(c => c.id === chapterId || c.number === chapterNumber);
  if(!ch) return;
  const db=$('detail-body');
  const da=$('detail-actions');
  const dt=$('detail-title');
  dt.textContent = '编辑第'+chapterNumber+'章';
  da.innerHTML = `<button class="detail-btn" onclick="cancelEdit()">取消</button>
    <button class="detail-btn edit" onclick="saveChapter('${chapterId}',${chapterNumber})">💾 保存</button>`;
  db.innerHTML = `
    <div style="margin-bottom:8px">
      <label style="font-size:12px;color:#666">章节标题</label>
      <input id="edit-title" type="text" value="${esc(ch.title||'')}" style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:14px;box-sizing:border-box">
    </div>
    <div style="margin-bottom:8px">
      <label style="font-size:12px;color:#666">章节内容</label>
      <textarea id="edit-content" style="width:100%;min-height:400px;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:monospace;box-sizing:border-box;line-height:1.6">${esc(ch.content||'')}</textarea>
    </div>
  `;
}

// Key bindings
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&e.target.id==='chat-input'){e.preventDefault();sendMsg()}
  if(e.key==='Enter'&&$('create-modal').classList.contains('show')&&e.target.id!=='coutline'){e.preventDefault();createNovel()}
});

// Init
loadNovels();
