<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>小说创作室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Noto Sans SC",sans-serif;background:#0f0f13;color:#e0e0e0;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:24px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.panel{background:#1a1a24;border:1px solid #2a2a35;border-radius:12px;padding:20px;margin-bottom:16px}
.panel h2{font-size:18px;margin-bottom:12px;color:#a78bfa}
.nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.nav button{background:#1e1e2a;border:1px solid #2a2a35;color:#ccc;padding:8px 16px;border-radius:8px;cursor:pointer}
.nav button.active{background:#4f46e5;border-color:#4f46e5;color:#fff}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:13px;color:#999;margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;background:#0f0f13;border:1px solid #2a2a35;color:#e0e0e0;padding:10px;border-radius:8px;font-size:14px}
.form-group textarea{min-height:80px;resize:vertical}
.btn{background:#4f46e5;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
.btn:hover{background:#5f56f5}
.btn-secondary{background:#2a2a35;color:#ccc}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#1e1e2a;border:1px solid #2a2a35;border-radius:8px;padding:14px;cursor:pointer}
.card:hover{border-color:#4f46e5}
.card h3{font-size:16px;margin-bottom:4px}
.card .meta{font-size:12px;color:#888}
.hidden{display:none}
.flex{display:flex;gap:8px;align-items:center}
pre{font-size:14px;line-height:1.8;color:#ccc;white-space:pre-wrap}
.char-tag{background:#2a2a3a;padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block;margin:2px}
#output,#dialogue-output{white-space:pre-wrap;font-size:14px;line-height:1.7;color:#ccc}
</style>
</head>
<body>
<div class="container">
<h1>✍️ 小说创作室</h1>
<div class="nav">
  <button class="active" onclick="switchTab('novels')">📚 小说</button>
  <button onclick="switchTab('outline')">📋 大纲</button>
  <button onclick="switchTab('chars')">👥 角色</button>
  <button onclick="switchTab('world')">🌍 世界观</button>
  <button onclick="switchTab('write')">✏️ 写作</button>
  <button onclick="switchTab('dialogue')">💬 对话</button>
</div>

<div id="tab-novels">
  <div class="panel">
    <div class="flex" style="justify-content:space-between"><h2>我的小说</h2><button class="btn btn-sm" onclick="showCreateNovel()">+ 新建</button></div>
    <div id="novel-list" class="grid mt-2"></div>
  </div>
</div>
<div id="tab-outline" class="hidden"><div class="panel" id="outline-panel"><h2>故事大纲</h2><div id="outline-content"></div></div></div>
<div id="tab-chars" class="hidden"><div class="panel"><h2>角色管理</h2><div id="char-content"></div></div></div>
<div id="tab-world" class="hidden"><div class="panel"><h2>世界观</h2><div id="world-content"></div></div></div>
<div id="tab-write" class="hidden"><div class="panel"><h2>✏️ 写作</h2><div class="form-group"><label>创作指令</label><textarea id="write-instr" rows="4" placeholder="描述要写的内容"></textarea></div><div class="flex"><button class="btn" onclick="generateText()">生成</button><button class="btn btn-secondary" onclick="writeChapter()">写下一章</button></div><div id="output" class="mt-2"></div></div></div>
<div id="tab-dialogue" class="hidden"><div class="panel"><h2>💬 角色对话</h2><div class="grid"><div class="form-group"><label>角色1</label><select id="d1"></select></div><div class="form-group"><label>角色2</label><select id="d2"></select></div></div><div class="form-group"><label>话题</label><input id="dtopic" placeholder="对话场景和话题"></div><button class="btn" onclick="doDialogue()">开始对话</button><div id="dialogue-output" class="mt-2"></div></div></div>
</div>
<div id="create-modal" class="hidden" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100">
<div class="panel" style="width:500px"><h2>新建小说</h2>
<div class="form-group"><label>标题</label><input id="ctitle"></div>
<div class="form-group"><label>类型</label><input id="cgenre" placeholder="玄幻/科幻/悬疑"></div>
<div class="form-group"><label>一句话梗概</label><textarea id="clogline" rows="2"></textarea></div>
<div class="flex" style="justify-content:flex-end"><button class="btn btn-secondary" onclick="document.getElementById('create-modal').classList.add('hidden')">取消</button><button class="btn" onclick="createNovel()">创建</button></div>
</div></div>

<script>
const API='/api/novel';let cid=null;
async function api(path,data){return await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data||{})}).then(r=>r.json())}
function switchTab(t){document.querySelectorAll('[id^=tab-]').forEach(e=>e.classList.add('hidden'));document.getElementById('tab-'+t).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.nav button').forEach(b=>{if(b.textContent.includes({novels:'📚',outline:'📋',chars:'👥',world:'🌍',write:'✏️',dialogue:'💬'}[t]))b.classList.add('active')});refreshTab(t)}
function refreshTab(t){if(t=='novels')loadNovels();else if(t=='outline'&&cid)loadOutline();else if(t=='chars'&&cid)loadChars();else if(t=='world'&&cid)loadWorld()}
function showCreateNovel(){document.getElementById('create-modal').classList.remove('hidden')}
async function loadNovels(){const d=await api('/list');const list=document.getElementById('novel-list');if(!d.novels||!d.novels.length){list.innerHTML='<div style="color:#888;padding:20px;text-align:center">还没有小说</div>';return}
list.innerHTML=d.novels.map(n=>`<div class="card" onclick="selectNovel('${n.id}')"><h3>${n.title}</h3><div class="meta">${n.genre||''} · ${n.status} · ${n.char_count}角色 · ${n.chapter_count}章</div></div>`).join('')}
async function selectNovel(id){cid=id;const d=await api('/report',{novel_id:id});document.getElementById('tab-novels').innerHTML=`<div class="panel"><h2>📖 ${d.title||'小说'}</h2><pre>${d.report||''}</pre><div class="flex mt-2"><button class="btn btn-sm btn-secondary" onclick="switchTab('outline')">📋 大纲</button><button class="btn btn-sm btn-secondary" onclick="switchTab('chars')">👥 角色</button><button class="btn btn-sm btn-secondary" onclick="switchTab('world')">🌍 世界观</button><button class="btn btn-sm" onclick="switchTab('write')">✏️ 写作</button></div></div>`}
async function createNovel(){const d=await api('/create',{title:document.getElementById('ctitle').value||'未命名',genre:document.getElementById('cgenre').value,logline:document.getElementById('clogline').value});if(d.novel_id){cid=d.novel_id;document.getElementById('create-modal').classList.add('hidden');loadNovels();switchTab('outline')}}
async function loadOutline(){const d=await api('/outline',{novel_id:cid});if(d.html)document.getElementById('outline-content').innerHTML=d.html;else document.getElementById('outline-content').innerHTML=`<button class="btn btn-sm" onclick="showOutlineForm()">新建大纲</button>`}
function showOutlineForm(){document.getElementById('outline-content').innerHTML=`<div class="form-group"><label>摘要</label><textarea id="osum" rows="4"></textarea></div><div class="grid"><div class="form-group"><label>第一幕</label><textarea id="oa1" rows="3"></textarea></div><div class="form-group"><label>第二幕</label><textarea id="oa2" rows="3"></textarea></div><div class="form-group"><label>第三幕</label><textarea id="oa3" rows="3"></textarea></div></div><div class="flex"><button class="btn" onclick="saveOutline()">保存</button><button class="btn btn-secondary" onclick="showChapterForm()">+ 章节</button></div>`}
async function saveOutline(){await api('/outline/save',{novel_id:cid,summary:document.getElementById('osum').value,three_act:{act1:document.getElementById('oa1').value,act2:document.getElementById('oa2').value,act3:document.getElementById('oa3').value}});loadOutline()}
function showChapterForm(){document.getElementById('outline-content').innerHTML+=`<div class="panel"><div class="grid"><div class="form-group"><label>章节号</label><input id="cn" type="number" value="1"></div><div class="form-group"><label>标题</label><input id="ctt" placeholder="标题"></div></div><div class="form-group"><label>概要</label><textarea id="csm" rows="2"></textarea></div><button class="btn" onclick="addChapter()">添加</button></div>`}
async function addChapter(){await api('/outline/chapter',{novel_id:cid,number:parseInt(document.getElementById('cn').value),title:document.getElementById('ctt').value,summary:document.getElementById('csm').value});loadOutline()}
async function loadChars(){const d=await api('/characters',{novel_id:cid});document.getElementById('char-content').innerHTML='<div class="flex" style="justify-content:space-between"><div class="char-list">'+(d.characters||[]).map(c=>`<span class="char-tag">${c.name}(${c.archetype||''})</span>`).join('')+'</div><button class="btn btn-sm btn-secondary" onclick="addCharForm()">+ 添加</button></div>'}
function addCharForm(){document.getElementById('char-content').innerHTML+=`<div class="panel"><div class="grid"><div class="form-group"><label>名字</label><input id="cname"></div><div class="form-group"><label>类型</label><select id="carch"><option>主角</option><option>女主角</option><option>反派</option><option>导师</option><option>伙伴</option><option>配角</option></select></div></div><div class="form-group"><label>性格（逗号分隔）</label><input id="cper" placeholder="勇敢, 机智, 温柔"></div><div class="form-group"><label>背景</label><textarea id="cbg" rows="2"></textarea></div><button class="btn" onclick="addChar()">添加</button></div>`}
async function addChar(){await api('/character/add',{novel_id:cid,name:document.getElementById('cname').value,archetype:document.getElementById('carch').value,personality:document.getElementById('cper').value.split(',').map(s=>s.trim()),background:document.getElementById('cbg').value});loadChars()}
async function loadWorld(){const d=await api('/world',{novel_id:cid});document.getElementById('world-content').innerHTML=(d.html||'暂无世界观')+`<div class="flex mt-2"><button class="btn btn-sm btn-secondary" onclick="createWorldForm()">新建世界观</button><button class="btn btn-sm btn-secondary" onclick="addSceneForm()">+ 场景</button></div>`}
function createWorldForm(){document.getElementById('world-content').innerHTML=`<div class="form-group"><label>世界名称</label><input id="wname" placeholder="大陆/星系名"></div><div class="form-group"><label>概述</label><textarea id="wdesc" rows="3"></textarea></div><div class="form-group"><label>规则（每行一个）</label><textarea id="wrules" rows="3" placeholder="魔法只能由血脉继承&#10;龙族千年才苏醒一次"></textarea></div><button class="btn" onclick="saveWorld()">保存</button>`}
async function saveWorld(){await api('/world/save',{novel_id:cid,name:document.getElementById('wname').value,overview:document.getElementById('wdesc').value,rules:document.getElementById('wrules').value.split('\n').filter(Boolean)});loadWorld()}
function addSceneForm(){document.getElementById('world-content').innerHTML+=`<div class="panel"><div class="form-group"><label>场景名</label><input id="sname"></div><div class="form-group"><label>地点</label><input id="sloc"></div><div class="form-group"><label>描述</label><textarea id="sdesc" rows="2"></textarea></div><button class="btn" onclick="addScene()">添加</button></div>`}
async function addScene(){await api('/scene/add',{novel_id:cid,name:document.getElementById('sname').value,location:document.getElementById('sloc').value,description:document.getElementById('sdesc').value});loadWorld()}
async function generateText(){const d=await api('/generate',{novel_id:cid,instruction:document.getElementById('write-instr').value});document.getElementById('output').innerHTML=d.content||'[生成失败]'}
async function writeChapter(){const d=await api('/chapter/write',{novel_id:cid});document.getElementById('output').innerHTML=d.content||'[请先创建大纲和章节]'}
async function doDialogue(){const d=await api('/dialogue',{novel_id:cid,char1:document.getElementById('d1').value,char2:document.getElementById('d2').value,topic:document.getElementById('dtopic').value});document.getElementById('dialogue-output').innerHTML=d.result||'[对话失败]'}
async function refreshDialogueChars(){if(!cid)return;const d=await api('/characters',{novel_id:cid});const chars=d.characters||[];[document.getElementById('d1'),document.getElementById('d2')].forEach(sel=>{sel.innerHTML=chars.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')})}
setInterval(()=>{if(!document.getElementById('tab-dialogue').classList.contains('hidden')&&cid)refreshDialogueChars()},3000);
loadNovels();
</script>
</body></html>
