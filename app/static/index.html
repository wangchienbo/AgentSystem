<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AgentSystem</title>
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26;
            --border: #2a2a3a; --text: #e8e8f0; --text-dim: #8888a0;
            --accent: #6c5ce7; --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d68f; --danger: #ff6b6b; --warning: #ffd43b;
            --radius: 12px; --radius-sm: 8px;
            --sidebar-w: 300px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%; height: 100dvh; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
        }

        /* === App Layout === */
        .app { display: flex; height: 100%; height: 100dvh; overflow: hidden; }

        /* === Sidebar === */
        .sidebar {
            width: var(--sidebar-w); background: var(--surface);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            flex-shrink: 0; z-index: 100; transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-header h1 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .sidebar-header .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }

        .sidebar-user {
            padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
        .sidebar-user:active { background: var(--surface-2); }
        .sidebar-user .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .sidebar-user .info { flex: 1; min-width: 0; }
        .sidebar-user .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-user .role-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .role-badge.admin { background: rgba(255,212,59,0.15); color: var(--warning); }
        .role-badge.user { background: rgba(108,92,231,0.15); color: var(--accent); }

        .new-chat-btn {
            margin: 12px 16px; padding: 12px; background: var(--accent); color: white;
            border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            flex-shrink: 0; touch-action: manipulation;
        }
        .new-chat-btn:active { opacity: 0.85; }

        .session-list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px; min-height: 0; overscroll-behavior: contain; }
        .session-item {
            padding: 12px 14px; border-radius: var(--radius-sm); cursor: pointer;
            margin-bottom: 4px; display: flex; align-items: center; gap: 10px;
            touch-action: manipulation; transition: background 0.15s;
        }
        .session-item:active { background: var(--surface-2); }
        .session-item.active { background: var(--surface-2); border-left: 3px solid var(--accent); }
        .session-item .s-icon { font-size: 16px; flex-shrink: 0; }
        .session-item .s-info { flex: 1; min-width: 0; }
        .session-item .s-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item .s-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
        .session-item .s-del {
            opacity: 0; background: none; border: none; color: var(--danger);
            cursor: pointer; font-size: 16px; padding: 4px 8px; flex-shrink: 0;
        }
        .session-item:active .s-del { opacity: 0.6; }

        .sidebar-footer {
            border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0;
            display: flex; gap: 8px;
        }
        .sidebar-footer button {
            flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--surface-2); color: var(--text); font-size: 13px; cursor: pointer;
            touch-action: manipulation;
        }
        .sidebar-footer button:active { background: var(--accent); border-color: var(--accent); color: white; }

        /* === Main Chat Area === */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; height: 100dvh; overflow: hidden; }

        .main-header {
            padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
            display: flex; align-items: center; gap: 12px; background: var(--surface);
        }
        .menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 4px; touch-action: manipulation; }
        .main-header .title { font-size: 15px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .messages { flex: 1; overflow-y: auto; overscroll-behavior: contain; padding: 20px; min-height: 0; }
        .message { margin-bottom: 20px; display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
        .message.user { flex-direction: row-reverse; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
        .message.user .avatar { background: var(--accent); }
        .message.system .avatar { background: var(--surface-2); border: 1px solid var(--border); }
        .bubble {
            max-width: 80%; padding: 12px 16px; border-radius: var(--radius);
            line-height: 1.6; font-size: 14px; word-wrap: break-word; overflow-wrap: break-word;
        }
        .message.user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .message.system .bubble { background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .bubble p { margin-bottom: 6px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .bubble pre { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
        .bubble pre code { background: none; padding: 0; }

        .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .action-btn {
            padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px;
            touch-action: manipulation;
        }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
        .action-btn:disabled { opacity: 0.5; }

        .typing { display: flex; gap: 4px; padding: 12px 16px; }
        .typing span { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

        .streaming::after { content: '▋'; animation: blink 0.8s infinite; color: var(--accent); }
        @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

        /* Welcome */
        .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 30px; }
        .welcome-icon { font-size: 42px; margin-bottom: 14px; }
        .welcome h2 { font-size: 22px; margin-bottom: 8px; }
        .welcome p { color: var(--text-dim); margin-bottom: 20px; font-size: 14px; }
        .quick-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .quick-btn {
            padding: 10px 16px; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); cursor: pointer; font-size: 13px;
            touch-action: manipulation;
        }
        .quick-btn:active { border-color: var(--accent); }

        /* Connection bar */
        .connection-bar { padding: 5px 16px; font-size: 12px; text-align: center; flex-shrink: 0; }
        .connection-bar.online { background: rgba(0,214,143,0.1); color: var(--success); }
        .connection-bar.offline { background: rgba(255,107,107,0.1); color: var(--danger); }
        .connection-bar.reconnecting { background: rgba(255,212,59,0.1); color: var(--warning); }

        /* Input area */
        .input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        .input-wrapper { display: flex; gap: 10px; align-items: flex-end; }
        .input-box {
            flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 12px 14px; color: var(--text); font-size: 15px; resize: none; max-height: 120px;
            min-height: 44px; height: 44px; line-height: 1.4; font-family: inherit;
            touch-action: manipulation;
        }
        .input-box:focus { outline: none; border-color: var(--accent); }
        .send-btn {
            width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
            border: none; color: white; cursor: pointer; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0; touch-action: manipulation;
        }
        .send-btn:active { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.5; }
        .stop-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--danger); border: none; color: white; cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; touch-action: manipulation; }

        /* === Modal overlay (settings, admin, custom) === */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
            display: none; align-items: flex-end; justify-content: center;
        }
        .overlay.open { display: flex; }
        .modal {
            background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
            width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
            overscroll-behavior: contain; padding: 24px 20px; padding-bottom: max(24px, env(safe-area-inset-bottom));
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal h3 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .modal h3 .close-btn { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 4px; }
        .modal .section { margin-bottom: 18px; }
        .modal label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-dim); }
        .modal input, .modal select, .modal textarea {
            width: 100%; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
        }
        .modal textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        .modal .btn-full {
            width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm);
            background: var(--accent); color: white; font-size: 14px; cursor: pointer;
            touch-action: manipulation;
        }
        .modal .btn-full:active { opacity: 0.85; }
        .modal .btn-danger { background: var(--danger); }
        .modal .btn-outline { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); }

        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .tag {
            display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px;
            border-radius: 16px; background: var(--surface-2); border: 1px solid var(--border);
            font-size: 13px; cursor: pointer; touch-action: manipulation;
        }
        .tag.active { background: var(--accent); border-color: var(--accent); color: white; }
        .tag .x { opacity: 0.6; margin-left: 2px; }

        .add-row { display: flex; gap: 8px; margin-top: 8px; }
        .add-row input { flex: 1; }
        .add-row button { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

        /* Custom commands */
        .cmd-item {
            padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-sm);
            margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between;
        }
        .cmd-item .cmd-label { font-size: 13px; font-weight: 500; }
        .cmd-item .cmd-prompt { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
        .cmd-item button { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; padding: 4px 8px; }

        /* Admin panel items */
        .admin-user-item {
            padding: 12px; background: var(--surface-2); border-radius: var(--radius-sm);
            margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between;
        }
        .admin-user-item .u-info { flex: 1; }
        .admin-user-item .u-name { font-size: 14px; font-weight: 500; }
        .admin-user-item .u-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
        .admin-user-item .u-actions { display: flex; gap: 6px; }
        .admin-user-item .u-actions button { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer; }
        .admin-user-item .u-actions button.danger { border-color: var(--danger); color: var(--danger); }

        /* Toast */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 14px; z-index: 300;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }
        @keyframes toastOut { to { opacity: 0; } }

        /* === MOBILE === */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 85vw; max-width: 320px; transform: translateX(-100%); z-index: 150; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 140; }
            .sidebar-backdrop.show { display: block; }
            .menu-btn { display: block; }
            .bubble { max-width: 90%; }
            .messages { padding: 16px 12px; }
            .input-area { padding: 10px 12px; }
            .modal { max-height: 90vh; }
            .welcome { padding: 20px; }
            .welcome h2 { font-size: 20px; }
            .quick-actions { flex-direction: column; }
            .quick-btn { text-align: center; }
        }

        @media (min-width: 769px) {
            .sidebar-backdrop { display: none !important; }
            .modal { border-radius: var(--radius); margin-bottom: 40px; max-height: 80vh; }
            .overlay { align-items: center; }
            @keyframes slideUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        }

        /* Confirm dialog */
        .confirm-dialog {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .confirm-dialog.open { display: flex; }
        .confirm-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; max-width: 360px; width: 100%; text-align: center;
        }
        .confirm-box .q { font-size: 15px; margin-bottom: 20px; }
        .confirm-box .btns { display: flex; gap: 10px; }
        .confirm-box .btns button {
            flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            cursor: pointer; font-size: 14px; background: var(--surface-2); color: var(--text);
        }
        .confirm-box .btns .yes { background: var(--accent); border-color: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar backdrop (mobile) -->
        <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1><span class="dot"></span> AgentSystem</h1>
            </div>
            <div class="sidebar-user" onclick="openSettings()">
                <div class="avatar-sm">✦</div>
                <div class="info">
                    <div class="name" id="sidebarUserName">加载中...</div>
                </div>
                <span class="role-badge user" id="sidebarRoleBadge">USER</span>
            </div>
            <button class="new-chat-btn" onclick="newSession()">✨ 新建对话</button>
            <div class="session-list" id="sessionList"></div>
            <div class="sidebar-footer">
                <button onclick="openCustomPanel()">🔧 自定义</button>
                <button onclick="openSettings()">⚙️ 设置</button>
                <button onclick="doLogout()">退出</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="main-header">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <span class="title" id="mainTitle">AgentSystem</span>
            </header>

            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">✦</div>
                    <h2>你好</h2>
                    <p>用自然语言管理你的 App，一切皆可对话</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="sendQuick('你好')">👋 打个招呼</button>
                        <button class="quick-btn" onclick="sendQuick('看看我的App列表')">📱 查看 App</button>
                        <button class="quick-btn" onclick="sendQuick('帮我建一个监控App')">🔨 创建 App</button>
                        <button class="quick-btn" onclick="sendQuick('系统状态怎么样')">📊 系统状态</button>
                    </div>
                </div>
            </div>

            <div class="connection-bar online" id="connBar">● 已连接</div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-box" id="inputBox" rows="1" placeholder="输入你的指令..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    <button class="stop-btn" id="stopBtn" onclick="stopStreaming()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="overlay" id="settingsOverlay" onclick="closeOverlay(event, 'settingsOverlay')">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>⚙️ 设置 <button class="close-btn" onclick="closeModal('settingsOverlay')">&times;</button></h3>
            <div class="section">
                <label>显示名称</label>
                <input id="settName" placeholder="你的名称" onchange="saveName()">
            </div>
            <div class="section">
                <label>修改密码</label>
                <input id="settOldPw" type="password" placeholder="当前密码" style="margin-bottom:6px">
                <input id="settNewPw" type="password" placeholder="新密码（至少4位）">
                <button class="btn-full" style="margin-top:8px" onclick="changePassword()">修改密码</button>
            </div>
            <div class="section">
                <label>交互风格</label>
                <div class="tag-row" id="styleTags">
                    <span class="tag" data-v="简洁" onclick="toggleTag(this)">简洁</span>
                    <span class="tag" data-v="详细" onclick="toggleTag(this)">详细</span>
                    <span class="tag" data-v="幽默" onclick="toggleTag(this)">幽默</span>
                    <span class="tag" data-v="专业" onclick="toggleTag(this)">专业</span>
                    <span class="tag" data-v="口语化" onclick="toggleTag(this)">口语化</span>
                    <span class="tag" data-v="技术型" onclick="toggleTag(this)">技术型</span>
                </div>
            </div>
            <div class="section">
                <label>回复语言</label>
                <select id="settLang"><option value="中文">中文</option><option value="English">English</option><option value="混合">混合</option></select>
            </div>
            <div class="section">
                <label>自定义指令（注入系统提示词）</label>
                <textarea id="settInstr" placeholder="每行一条，例如：&#10;- 多用示例&#10;- 不要用emoji&#10;- 代码用中文注释"></textarea>
            </div>
            <div class="section">
                <label>自定义偏好标签</label>
                <div class="tag-row" id="customTags"></div>
                <div class="add-row"><input id="newTagInput" placeholder="添加自定义标签..."><button onclick="addCustomTag()">添加</button></div>
            </div>
            <button class="btn-full" onclick="savePrefs()">💾 保存偏好</button>
        </div>
    </div>

    <!-- Custom Commands Panel -->
    <div class="overlay" id="customOverlay" onclick="closeOverlay(event, 'customOverlay')">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>🔧 自定义交互 <button class="close-btn" onclick="closeModal('customOverlay')">&times;</button></h3>
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">创建个人快捷指令，一键触发常用操作。</p>
            <div id="customCmdList"></div>
            <div class="section" style="margin-top:16px">
                <label>新建快捷指令</label>
                <input id="cmdLabel" placeholder="指令名称（如：查看服务器状态）" style="margin-bottom:6px">
                <textarea id="cmdPrompt" placeholder="实际发送的指令内容..."></textarea>
                <button class="btn-full" style="margin-top:8px" onclick="addCustomCmd()">添加指令</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="overlay" id="adminOverlay" onclick="closeOverlay(event, 'adminOverlay')">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>👑 管理员面板 <button class="close-btn" onclick="closeModal('adminOverlay')">&times;</button></h3>
            <div class="section">
                <label>用户管理</label>
                <div id="adminUserList"></div>

    <script>
    const API = window.location.origin;
    let sessionId = null, currentStream = null, isStreaming = false;
    let reconnectAttempts = 0, reconnectTimer = null;
    const MAX_RECONNECT = 5;
    let currentUser = null;
    let customTags = [];
    let customCmds = [];
    let confirmCallback = null;

    // ===== Auth & Init =====
    (async function init() {
        const token = localStorage.getItem('as_token');
        if (!token) { window.location.href = '/'; return; }

        try {
            const r = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!r.ok) { localStorage.removeItem('as_token'); window.location.href = '/'; return; }
            currentUser = await r.json();
        } catch { localStorage.removeItem('as_token'); window.location.href = '/'; return; }

        // Setup UI
        document.getElementById('sidebarUserName').textContent = currentUser.display_name || currentUser.user_id;
        const badge = document.getElementById('sidebarRoleBadge');
        badge.textContent = currentUser.role === 'admin' ? 'ADMIN' : 'USER';
        badge.className = 'role-badge ' + (currentUser.role === 'admin' ? 'admin' : 'user');

        // Load custom data
        loadCustomData();

        // Auto-load last session or show welcome
        try {
            const r = await fetch(`${API}/chat/sessions/last?user_id=${currentUser.user_id}`);
            const d = await r.json();
            if (d.session && d.session.message_count > 0) {
                loadSession(d.session.session_id, d.session.title);
            } else {
                updateWelcome();
            }
        } catch { updateWelcome(); }

        loadSessions();
        document.getElementById('inputBox').focus();
    })();

    function updateWelcome() {
        const h2 = document.querySelector('#welcome h2');
        if (h2) h2.textContent = `你好，${currentUser.display_name || currentUser.user_id}`;
    }

    function doLogout() {
        showConfirm('确定退出登录？', () => {
            localStorage.removeItem('as_token');
            window.location.href = '/
