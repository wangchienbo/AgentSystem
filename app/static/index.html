<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentSystem</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d68f;
            --danger: #ff6b6b;
            --warning: #ffd43b;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Layout */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .new-chat-btn {
            margin: 16px 20px;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .new-chat-btn:hover {
            background: #7c6df7;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            min-height: 0;
        }

        .session-item {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover { background: var(--surface-2); }
        .session-item.active { background: var(--surface-2); border-left: 3px solid var(--accent); }

        .session-item .label {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .session-item .time {
            font-size: 11px;
            color: var(--text-dim);
        }

        .session-item .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
        }

        .session-item:hover .delete-btn { opacity: 1; }

        /* User section */
        .user-section {
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            background: var(--surface-2);
            flex-shrink: 0;
        }
        .user-info {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; padding: 8px; border-radius: var(--radius-sm);
            transition: background 0.15s;
        }
        .user-info:hover { background: var(--surface); }
        .user-avatar { font-size: 28px; }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-status { font-size: 11px; color: var(--text-dim); }
        .user-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
        .user-btn { background: none; border: 1px solid var(--border); color: var(--text);
            padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .user-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

        /* User settings panel */
        .user-settings {
            position: fixed; top: 0; right: 0; width: 380px; height: 100vh;
            background: var(--surface); border-left: 1px solid var(--border);
            box-shadow: -8px 0 32px rgba(0,0,0,0.5); padding: 24px;
            transform: translateX(100%); transition: transform 0.3s ease;
            z-index: 1000; overflow-y: auto;
        }
        .user-settings.open { transform: translateX(0); }
        .user-settings h3 { margin-bottom: 20px; font-size: 18px; }
        .settings-section { margin-bottom: 20px; }
        .settings-section label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-dim); }
        .settings-section input, .settings-section select, .settings-section textarea {
            width: 100%; padding: 10px; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 14px;
        }
        .settings-section textarea { resize: vertical; min-height: 80px; font-family: inherit; }

        /* Preference tags */
        .pref-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .pref-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 12px; border-radius: 16px;
            background: var(--surface-2); border: 1px solid var(--border);
            font-size: 13px; cursor: pointer; transition: all 0.15s;
        }
        .pref-tag:hover { border-color: var(--accent); }
        .pref-tag.active { background: var(--accent); border-color: var(--accent); color: white; }
        .pref-tag .remove { font-size: 14px; opacity: 0.6; margin-left: 4px; }
        .pref-tag .remove:hover { opacity: 1; }
        .save-btn {
            width: 100%; padding: 10px; background: var(--accent); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
            transition: all 0.15s; margin-top: 8px;
        }
        .save-btn:hover { background: #7c6df7; }
        .pref-add-row { display: flex; gap: 8px; margin-top: 8px; }
        .pref-add-row input {
            flex: 1; padding: 8px 12px; background: var(--surface-2);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); font-size: 13px;
        }
        .pref-add-row button {
            padding: 8px 16px; background: var(--accent); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .settings-close { position: absolute; top: 16px; right: 16px; background: none; border: none;
            color: var(--text); font-size: 20px; cursor: pointer; }
        .version-list { list-style: none; padding: 0; }
        .version-list li { padding: 10px; margin-bottom: 6px; background: var(--surface-2);
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .version-list .version-id { font-size: 12px; color: var(--accent); }
        .version-list .version-desc { font-size: 13px; }
        .version-list .version-time { font-size: 11px; color: var(--text-dim); }
        .version-list button { background: var(--accent); border: none; color: white;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* Main */
        .main {
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
            min-height: 0;
        }

        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar { background: var(--accent); }
        .message.system .avatar { background: var(--surface-2); border: 1px solid var(--border); }

        .bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
            position: relative;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.system .bubble {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble p { margin-bottom: 8px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        /* Action buttons in messages */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            border-color: var(--accent);
            background: var(--surface-2);
        }

        .action-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .action-btn.primary:hover {
            background: #7c6df7;
        }

        .action-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
        }

        .typing span {
            width: 6px; height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Connection status bar */
        .connection-bar {
            padding: 6px 24px;
            font-size: 12px;
            text-align: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .connection-bar.online { background: rgba(0, 214, 143, 0.1); color: var(--success); }
        .connection-bar.offline { background: rgba(255, 107, 107, 0.1); color: var(--danger); }
        .connection-bar.reconnecting { background: rgba(255, 212, 59, 0.1); color: var(--warning); animation: pulse 1s infinite; }

        /* Input area - FIXED at bottom */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            color: var(--text);
            font-size: 14px;
            resize: none;
            max-height: 150px;
            min-height: 48px;
            height: 48px;
            line-height: 1.5;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        .input-box::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #7c6df7;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stop-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--danger);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .stop-btn:hover { background: #ff8787; }

        /* Card style messages */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 8px;
        }

        .card-header {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .card-body {
            font-size: 14px;
            line-height: 1.6;
        }

        /* List items */
        .list-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .list-item:last-child { border-bottom: none; }

        .list-item .title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .list-item .desc {
            font-size: 12px;
            color: var(--text-dim);
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 8px;
        }

        .status-badge.running { background: rgba(0, 214, 143, 0.15); color: var(--success); }
        .status-badge.stopped { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
        .status-badge.paused { background: rgba(255, 212, 59, 0.15); color: var(--warning); }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .quick-btn {
            padding: 12px 20px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            background: var(--surface);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .bubble { max-width: 90%; }
        }

        /* Streaming text cursor */
        .streaming::after {
            content: '▋';
            animation: blink 0.8s infinite;
            color: var(--accent);
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Confirm dialog */
        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            max-width: 400px;
        }

        .confirm-box .question {
            font-size: 15px;
            margin-bottom: 16px;
        }

        .confirm-box .btns {
            display: flex;
            gap: 12px;
        }

        .confirm-box .btns button {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            background: var(--surface-2);
            color: var(--text);
            transition: all 0.15s;
        }

        .confirm-box .btns .confirm-yes {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .confirm-box .btns .confirm-no {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Token usage badge */
        .token-usage {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            padding: 4px 10px;
            background: rgba(108, 92, 231, 0.08);
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-dim);
            width: fit-content;
        }

        .token-usage .tokens {
            font-weight: 500;
            color: var(--accent);
        }

        .token-usage .model {
            opacity: 0.6;
        }

        .token-usage .cached {
            color: var(--success);
            font-weight: 500;
        }

        /* Token stats panel */
        .token-stats {
            padding: 8px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            font-size: 12px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .token-stats .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        .token-stats .stats-val {
            color: var(--accent);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .token-stats-toggle {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 11px;
            padding: 4px 0;
            width: 100%;
            text-align: center;
            opacity: 0.6;
            transition: opacity 0.15s;
        }

        .token-stats-toggle:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1><span class="dot"></span> AgentSystem</h1>
            </div>
            <button class="new-chat-btn" onclick="newSession()">
                ✨ 新建对话
            </button>
            <div class="session-list" id="sessionList">
                <!-- Sessions populated by JS -->
            </div>
            <!-- User profile section -->
            <div class="user-section" id="userSection">
                <div class="user-info" onclick="showUserSettings()">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">加载中...</div>
                        <div class="user-status" id="userStatus">在线</div>
                    </div>
                </div>
                <div class="user-actions">
                    <button class="user-btn" onclick="showVersions()" title="版本历史">📦</button>
                    <button class="user-btn" onclick="showSettings()" title="设置">⚙️</button>
                    <button class="user-btn" onclick="logout()" title="退出">🚪</button>
                </div>
            </div>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">✦</div>
                    <h2>你好，我是 AgentSystem</h2>
                    <p>用自然语言管理你的 App，创建、启动、停止、查询，一切皆可对话。</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="sendQuick('你好')">👋 打个招呼</button>
                        <button class="quick-btn" onclick="sendQuick('看看我的App列表')">📱 查看 App</button>
                        <button class="quick-btn" onclick="sendQuick('帮我建一个监控App')">🔨 创建 App</button>
                        <button class="quick-btn" onclick="sendQuick('系统状态怎么样')">📊 系统状态</button>
                    </div>
                </div>
            </div>

            <!-- Connection status bar -->
            <div class="connection-bar online" id="connectionBar">● 已连接</div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-box" id="inputBox" rows="1"
                              placeholder="输入你的指令..."
                              onkeydown="handleKey(event)"
                              oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                    <button class="stop-btn" id="stopBtn" onclick="stopStreaming()" title="停止生成" style="display:none">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                        </svg>
                    </button>
                </div>
                <button class="token-stats-toggle" onclick="toggleTokenStats()">📊 Token 消耗</button>
                <div class="token-stats" id="tokenStats" style="display:none">
                    <div class="stats-row"><span>总调用</span><span class="stats-val" id="statCalls">0</span></div>
                    <div class="stats-row"><span>Prompt</span><span class="stats-val" id="statPrompt">0</span></div>
                    <div class="stats-row"><span>Completion</span><span class="stats-val" id="statCompletion">0</span></div>
                    <div class="stats-row"><span>总计</span><span class="stats-val" id="statTotal">0</span></div>
                    <div class="stats-row"><span>缓存命中</span><span class="stats-val" id="statCached">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let sessionId = null;
        let currentStream = null;
        let isStreaming = false;
        let tokenStatsVisible = false;
        let reconnectAttempts = 0;
        let reconnectTimer = null;
        const MAX_RECONNECT = 5;

        // Init
        // Extract user_id from URL path (/chat/{user_id})
        let currentUserId = 'web-user';
        const pathParts = window.location.pathname.split('/');
        const chatIndex = pathParts.indexOf('chat');
        if (chatIndex >= 0 && pathParts.length > chatIndex + 1) {
            currentUserId = pathParts[chatIndex + 1];
        }

        document.addEventListener('DOMContentLoaded', async () => {
            loadTokenStats();
            loadUserContext();
            loadPrefs();
            document.getElementById('inputBox').focus();

            // Load user memory context
            try {

        function formatSessionTime(isoStr) {
            const d = new Date(isoStr);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
            if (diff < 172800000) return '昨天';
            return `${d.getMonth()+1}/${d.getDate()}`;
        }

        function escapeHtml(str) {

        // ===== Connection management =====
        function setConnectionStatus(status, text) {
            const bar = document.getElementById('connectionBar');

        }

        function scheduleReconnect(body, bubbleEl, fullContent) {
            if (reconnectAttempts >= MAX_RECONNECT) {
                setConnectionStatus('offline', '✕ 连接已断开，请刷新页面重试');
                if (fullContent) {
                    updateStreamingBubble(bubbleEl, fullContent + '\n\n[连接已断开，请刷新重试]', false);
                }
                return;
            }
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
            reconnectAttempts++;
            setConnectionStatus('reconnecting', `⟳ 连接断开，${Math.ceil(delay/1000)}秒后重连 (${reconnectAttempts}/${MAX_RECONNECT})...`);
            reconnectTimer = setTimeout(() => {
                setConnectionStatus('reconnecting', '⟳ 正在重新连接...');
                // Fallback to non-streaming endpoint
                fetch(`${API}/chat/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                }).then(r => r.json()).then(data => {
                    reconnectAttempts = 0;
                    setConnectionStatus('online', '● 已连接');
                    if (data.content) {
                        updateStreamingBubble(bubbleEl, (fullContent ? fullContent + '\n\n' : '') + data.content, false, data.actions, data.usage);
                    }
                }).catch(() => {
                    scheduleReconnect(body, bubbleEl, fullContent);
                }).finally(() => {
                    isStreaming = false; currentStream = null;
                    document.getElementById('sendBtn').style.display = 'flex';
                    document.getElementById('stopBtn').style.display = 'none';
                });
            }, delay);
        }

        async function sendMessage() {
            const input = document.getElementById('inputBox');
            const text = input.value.trim();
            if (!text || isStreaming) return;

            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            isStreaming = true;
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'flex';
            setConnectionStatus('online', '● 正在回复...');

            const bubbleEl = appendStreamingBubble();
            let fullContent = '';

            try {
                const body = {
                    user_id: currentUserId,
                    channel: 'webchat',
                    message: text,
                };
                if (sessionId) body.session_id = sessionId;

                if (window.userMemory && window.userMemory.context_summary) {
                    body.memory_context = window.userMemory.context_summary;
                }

                const controller = new AbortController();
                currentStream = controller;

                const response = await fetch(`${API}/chat/message/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: controller.signal,
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                reconnectAttempts = 0;

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.type === 'chunk') {
                                fullContent += data.content;
                                updateStreamingBubble(bubbleEl, fullContent, true);
                            } else if (data.type === 'complete') {
                                fullContent = data.content;
                                sessionId = data.session_id;
                                updateStreamingBubble(bubbleEl, fullContent, false, data.actions, data.usage);
                                loadSessions(); loadTokenStats();
                            } else if (data.type === 'error') {
                                updateStreamingBubble(bubbleEl, '⚠️ ' + data.message, false);
                            }
                        } catch (e) { /* skip malformed */ }
                    }
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    if (fullContent) {
                        updateStreamingBubble(bubbleEl, fullContent + '\n\n[已停止生成]', false);
                    } else { bubbleEl.remove(); appendMessage('system', '[已停止]'); }
                } else {
                    // Auto-reconnect with fallback
                    const body = { user_id: currentUserId, channel: 'webchat', message: text };
                    if (sessionId) body.session_id = sessionId;
                    scheduleReconnect(body, bubbleEl, fullContent);
                    return; // Don't reset isStreaming yet
                }
            } finally {
                isStreaming = false;
                currentStream = null;
                document.getElementById('sendBtn').style.display = 'flex';
                document.getElementById('stopBtn').style.display = 'none';
                setConnectionStatus('online', '● 已连接');
                document.getElementById('inputBox').focus();
            }
        }

        function appendMessage(role, content, actions = null, usage = null) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '✦';
            let actionsHtml = '';
            if (actions && actions.length > 0) {
                actionsHtml = '<div class="actions">' +
                    actions.map(a => {
                        const cls = a.style === 'primary' ? 'primary' :
                                   a.style === 'danger' ? 'danger' : '';
                        const payload = JSON.stringify(a.payload || {}).replace(/"/g, '&quot;');
                        return `<button class="action-btn ${cls}"
                                    onclick='handleAction("${a.id}", ${payload})'>
                                    ${a.label}
                                </button>`;
                    }).join('') +
                    '</div>';
            }

            // Convert newlines to paragraphs
            const safeContent = content || '(空响应)';
            const html = safeContent.split('\n').filter(Boolean).map(p =>
                `<p>${p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/` + '`' + `(.+?)` + '`' + `/g, '<code>$1</code>')}</p>`
            ).join('');

            let usageHtml = '';
            if (usage) {
                const cachedBadge = usage.cached ? '<span class="cached">⚡ 缓存</span>' : '';
                usageHtml = `<div class="token-usage">
                    <span class="tokens">${usage.total_tokens.toLocaleString()} tokens</span>
                    <span class="model">${usage.model || ''}</span>
                    ${cachedBadge}
                </div>`;
            }

            div.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">
                    ${html}
                    ${actionsHtml}
                    ${usageHtml}
                </div>`;

            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function appendStreamingBubble() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');

        function updateStreamingBubble(bubbleEl, content, isStreaming, actions = null, usage = null) {
            if (isStreaming) {
                bubbleEl.classList.add('streaming');
            } else {
                bubbleEl.classList.remove('streaming');
            }

            const safeContent = content || '(空响应)';
            const html = safeContent.split('\n').filter(Boolean).map(p =>
                `<p>${p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/` + '`' + `(.+?)` + '`' + `/g, '<code>$1</code>')}</p>`
            ).join('');

            let actionsHtml = '';
            if (actions && actions.length > 0 && !isStreaming) {
                actionsHtml = '<div class="actions">' +
                    actions.map(a => {
                        const cls = a.style === 'primary' ? 'primary' :
                                   a.style === 'danger' ? 'danger' : '';
                        const payload = JSON.stringify(a.payload || {}).replace(/"/g, '&quot;');
                        return `<button class="action-btn ${cls}"
                                    onclick='handleAction("${a.id}", ${payload})'>
                                    ${a.label}
                                </button>`;
                    }).join('') +
                    '</div>';
            }

            let usageHtml = '';
            if (usage && !isStreaming) {
                const cachedBadge = usage.cached ? '<span class="cached">⚡ 缓存</span>' : '';
                usageHtml = `<div class="token-usage">
                    <span class="tokens">${usage.total_tokens.toLocaleString()} tokens</span>
                    <span class="model">${usage.model || ''}</span>
                    ${cachedBadge}
                </div>`;
            }

            bubbleEl.innerHTML = html + actionsHtml + usageHtml;
            scrollToBottom();
        }

        async function handleAction(actionId, payload) {
            if (!sessionId) return;

            // Disable all action buttons in the message
            event.target.closest('.actions').querySelectorAll('button').forEach(b => b.disabled = true);

            try {
                const r = await fetch(`${API}/chat/actions/${actionId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        session_id: sessionId,
                        action_params: payload,
                    }),
                });
                const data = await r.json();
                appendMessage('system', data.content, data.actions, data.usage);
            } catch (e) {
                appendMessage('system', '⚠️ 操作失败：' + e.message);
            }
        }

                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ operation: 'update_preference', user_id: currentUserId, preference_key: 'custom_tags', preference_value: customTags })
                    }),
                ]);
                alert('偏好已保存 ✅');
                window.userMemory = null;
                loadUserContext();
            } catch (e) { alert('保存失败: ' + e.message); }
        }

        // Load user context on page load
        if (typeof loadUserContext === 'function') {
            // Will be called after DOM ready
        }

    </script>
    <!-- User Settings Panel -->
    <div class="user-settings" id="settingsPanel">
        <button class="settings-close" onclick="closeSettings()">✕</button>
        <h3>⚙️ 用户设置</h3>
        <div class="settings-section">
            <label>显示名称</label>
            <input id="settingsDisplayName" placeholder="你的显示名称" onchange="saveSettings()">
        </div>
        <div class="settings-section">
            <label>交互风格</label>
            <div class="pref-tags" id="prefStyleTags">
                <span class="pref-tag" data-val="简洁" onclick="togglePrefTag(this)">简洁</span>
                <span class="pref-tag" data-val="详细" onclick="togglePrefTag(this)">详细</span>
                <span class="pref-tag" data-val="幽默" onclick="togglePrefTag(this)">幽默</span>
                <span class="pref-tag" data-val="专业" onclick="togglePrefTag(this)">专业</span>
                <span class="pref-tag" data-val="口语化" onclick="togglePrefTag(this)">口语化</span>
                <span class="pref-tag" data-val="技术型" onclick="togglePrefTag(this)">技术型</span>
            </div>
        </div>
        <div class="settings-section">
            <label>回复语言</label>
            <select id="prefLanguage">
                <option value="中文">中文</option>
                <option value="English">English</option>
                <option value="中文/English 混合">中文/English 混合</option>
            </select>
        </div>
        <div class="settings-section">
            <label>自定义指令（每行一条，会注入到系统提示词）</label>
            <textarea id="prefCustom" placeholder="例如：\n- 回答时多用示例\n- 不要使用emoji\n- 代码用中文注释"></textarea>
        </div>
        <div class="settings-section">
            <label>添加自定义偏好</label>
            <div class="pref-add-row">
                <input id="prefNewInput" placeholder="输入自定义偏好...">
                <button onclick="addCustomPref()">添加</button>
            </div>
            <div class="pref-tags" id="prefCustomTags"></div>
        </div>
        <button class="save-btn" onclick="saveAllPrefs()">💾 保存偏好</button>
        <div class="settings-section" style="margin-top:20px;">
            <label>记忆上下文</label>
            <div id="memoryContext" style="font-size:13px;color:var(--text-dim);padding:8px;background:var(--surface-2);border-radius:6px;min-height:60px;">加载中...</div>
        </div>
        <div class="settings-section">
            <label>App 版本</label>
            <div id="versionInfo" style="font-size:13px;color:var(--text-dim);padding:8px;background:var(--surface-2);border-radius:6px;">加载中...</div>
        </div>
    </div>

    <!-- Version History Panel -->
    <div class="user-settings" id="versionPanel">
        <button class="settings-close" onclick="closeVersions()">✕</button>
        <h3>📦 版本历史</h3>
        <ul class="version-list" id="versionList"><li>加载中...</li></ul>
    </div>

</body>
</html>
