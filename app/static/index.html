<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentSystem</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d68f;
            --danger: #ff6b6b;
            --warning: #ffd43b;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .new-chat-btn {
            margin: 16px 20px;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #7c6df7;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-item {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover { background: var(--surface-2); }
        .session-item.active { background: var(--surface-2); border-left: 3px solid var(--accent); }

        .session-item .label {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .session-item .time {
            font-size: 11px;
            color: var(--text-dim);
        }

        .session-item .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
        }

        .session-item:hover .delete-btn { opacity: 1; }

        /* Main */
        .main {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar { background: var(--accent); }
        .message.system .avatar { background: var(--surface-2); border: 1px solid var(--border); }

        .bubble {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
            position: relative;
        }

        .message.user .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.system .bubble {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble p { margin-bottom: 8px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        /* Action buttons in messages */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            border-color: var(--accent);
            background: var(--surface-2);
        }

        .action-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .action-btn.primary:hover {
            background: #7c6df7;
        }

        .action-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
        }

        .typing span {
            width: 6px; height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input area */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            color: var(--text);
            font-size: 14px;
            resize: none;
            max-height: 150px;
            min-height: 48px;
            line-height: 1.5;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        .input-box::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #7c6df7;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stop-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--danger);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .stop-btn:hover { background: #ff8787; }

        /* Card style messages */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 8px;
        }

        .card-header {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .card-body {
            font-size: 14px;
            line-height: 1.6;
        }

        /* List items */
        .list-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .list-item:last-child { border-bottom: none; }

        .list-item .title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .list-item .desc {
            font-size: 12px;
            color: var(--text-dim);
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 8px;
        }

        .status-badge.running { background: rgba(0, 214, 143, 0.15); color: var(--success); }
        .status-badge.stopped { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
        .status-badge.paused { background: rgba(255, 212, 59, 0.15); color: var(--warning); }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .quick-btn {
            padding: 12px 20px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            background: var(--surface);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .bubble { max-width: 90%; }
        }

        /* Streaming text cursor */
        .streaming::after {
            content: '▋';
            animation: blink 0.8s infinite;
            color: var(--accent);
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Confirm dialog */
        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 12px;
            max-width: 400px;
        }

        .confirm-box .question {
            font-size: 15px;
            margin-bottom: 16px;
        }

        .confirm-box .btns {
            display: flex;
            gap: 12px;
        }

        .confirm-box .btns button {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            background: var(--surface-2);
            color: var(--text);
            transition: all 0.15s;
        }

        .confirm-box .btns .confirm-yes {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .confirm-box .btns .confirm-no {
            border-color: var(--danger);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1><span class="dot"></span> AgentSystem</h1>
            </div>
            <button class="new-chat-btn" onclick="newSession()">
                ✨ 新建对话
            </button>
            <div class="session-list" id="sessionList">
                <!-- Sessions populated by JS -->
            </div>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">✦</div>
                    <h2>你好，我是 AgentSystem</h2>
                    <p>用自然语言管理你的 App，创建、启动、停止、查询，一切皆可对话。</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="sendQuick('你好')">👋 打个招呼</button>
                        <button class="quick-btn" onclick="sendQuick('看看我的App列表')">📱 查看 App</button>
                        <button class="quick-btn" onclick="sendQuick('帮我建一个监控App')">🔨 创建 App</button>
                        <button class="quick-btn" onclick="sendQuick('系统状态怎么样')">📊 系统状态</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-box" id="inputBox" rows="1"
                              placeholder="输入你的指令..."
                              onkeydown="handleKey(event)"
                              oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                    <button class="stop-btn" id="stopBtn" onclick="stopStreaming()" title="停止生成" style="display:none">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let sessionId = null;
        let currentStream = null;
        let isStreaming = false;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadSessions();
            document.getElementById('inputBox').focus();
        });

        function newSession() {
            sessionId = null;
            document.getElementById('messages').innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">✦</div>
                    <h2>新对话</h2>
                    <p>开始一个新的对话</p>
                </div>`;
            document.getElementById('inputBox').focus();
        }

        async function loadSessions() {
            try {
                const r = await fetch(`${API}/chat/sessions`);
                const data = await r.json();
                const list = document.getElementById('sessionList');
                list.innerHTML = '';
                data.sessions.slice(0, 20).forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'session-item' + (s.session_id === sessionId ? ' active' : '');
                    div.innerHTML = `
                        <span class="label">${s.session_id.slice(0, 12)}</span>
                        <span class="time">${new Date(s.created_at).toLocaleDateString()}</span>
                        <button class="delete-btn" onclick="event.stopPropagation();deleteSession('${s.session_id}')">×</button>`;
                    div.onclick = () => loadSession(s.session_id);
                    list.appendChild(div);
                });
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        async function loadSession(id) {
            sessionId = id;
            const messages = document.getElementById('messages');
            messages.innerHTML = '';
            try {
                const r = await fetch(`${API}/chat/sessions/${id}/messages`);
                const data = await r.json();
                data.messages.forEach(msg => {
                    appendMessage(msg.role === 'user' ? 'user' : 'system', msg.content);
                });
            } catch (e) {
                console.error('Failed to load session:', e);
            }
            loadSessions();
            scrollToBottom();
        }

        async function deleteSession(id) {
            await fetch(`${API}/chat/sessions/${id}`, { method: 'DELETE' });
            loadSessions();
            if (sessionId === id) newSession();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
        }

        function sendQuick(text) {
            document.getElementById('inputBox').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('inputBox');
            const text = input.value.trim();
            if (!text || isStreaming) return;

            // Hide welcome
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            // Start streaming
            isStreaming = true;
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'flex';

            const bubbleEl = appendStreamingBubble();
            let fullContent = '';

            try {
                const body = {
                    user_id: 'web-user',
                    channel: 'webchat',
                    message: text,
                };
                if (sessionId) body.session_id = sessionId;

                const controller = new AbortController();
                currentStream = controller;

                const response = await fetch(`${API}/chat/message/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: controller.signal,
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.type === 'chunk') {
                                fullContent += data.content;
                                updateStreamingBubble(bubbleEl, fullContent, true);
                            } else if (data.type === 'complete') {
                                fullContent = data.content;
                                sessionId = data.session_id;
                                updateStreamingBubble(bubbleEl, fullContent, false, data.actions);
                                loadSessions();
                            } else if (data.type === 'error') {
                                updateStreamingBubble(bubbleEl, '⚠️ ' + data.message, false);
                            }
                        } catch (e) {
                            // Skip malformed SSE data
                        }
                    }
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    if (fullContent) {
                        updateStreamingBubble(bubbleEl, fullContent + '\n\n[已停止生成]', false);
                    } else {
                        bubbleEl.remove();
                        appendMessage('system', '[已停止]');
                    }
                } else {
                    if (fullContent) {
                        updateStreamingBubble(bubbleEl, fullContent, false);
                    } else {
                        appendMessage('system', '⚠️ 请求失败：' + e.message);
                    }
                }
            } finally {
                isStreaming = false;
                currentStream = null;
                document.getElementById('sendBtn').style.display = 'flex';
                document.getElementById('stopBtn').style.display = 'none';
                document.getElementById('inputBox').focus();
            }
        }

        function stopStreaming() {
            if (currentStream) {
                currentStream.abort();
            }
        }

        function appendMessage(role, content, actions = null) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '✦';
            let actionsHtml = '';
            if (actions && actions.length > 0) {
                actionsHtml = '<div class="actions">' +
                    actions.map(a => {
                        const cls = a.style === 'primary' ? 'primary' :
                                   a.style === 'danger' ? 'danger' : '';
                        const payload = JSON.stringify(a.payload || {}).replace(/"/g, '&quot;');
                        return `<button class="action-btn ${cls}"
                                    onclick='handleAction("${a.id}", ${payload})'>
                                    ${a.label}
                                </button>`;
                    }).join('') +
                    '</div>';
            }

            // Convert newlines to paragraphs
            const html = content.split('\n').filter(Boolean).map(p =>
                `<p>${p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`(.+?)`/g, '<code>$1</code>')}</p>`
            ).join('');

            div.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="bubble">
                    ${html}
                    ${actionsHtml}
                </div>`;

            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function appendTyping() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = `
                <div class="avatar">✦</div>
                <div class="bubble">
                    <div class="typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>`;
            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function appendStreamingBubble() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = `
                <div class="avatar">✦</div>
                <div class="bubble streaming"></div>`;
            messages.appendChild(div);
            scrollToBottom();
            return div.querySelector('.bubble');
        }

        function updateStreamingBubble(bubbleEl, content, isStreaming, actions = null) {
            if (isStreaming) {
                bubbleEl.classList.add('streaming');
            } else {
                bubbleEl.classList.remove('streaming');
            }

            const html = content.split('\n').filter(Boolean).map(p =>
                `<p>${p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/` + '`' + `(.+?)` + '`' + `/g, '<code>$1</code>')}</p>`
            ).join('');

            let actionsHtml = '';
            if (actions && actions.length > 0 && !isStreaming) {
                actionsHtml = '<div class="actions">' +
                    actions.map(a => {
                        const cls = a.style === 'primary' ? 'primary' :
                                   a.style === 'danger' ? 'danger' : '';
                        const payload = JSON.stringify(a.payload || {}).replace(/"/g, '&quot;');
                        return `<button class="action-btn ${cls}"
                                    onclick='handleAction("${a.id}", ${payload})'>
                                    ${a.label}
                                </button>`;
                    }).join('') +
                    '</div>';
            }

            bubbleEl.innerHTML = html + actionsHtml;
            scrollToBottom();
        }

        async function handleAction(actionId, payload) {
            if (!sessionId) return;

            // Disable all action buttons in the message
            event.target.closest('.actions').querySelectorAll('button').forEach(b => b.disabled = true);

            try {
                const r = await fetch(`${API}/chat/actions/${actionId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: 'web-user',
                        session_id: sessionId,
                        action_params: payload,
                    }),
                });
                const data = await r.json();
                appendMessage('system', data.content, data.actions);
            } catch (e) {
                appendMessage('system', '⚠️ 操作失败：' + e.message);
            }
        }

        function scrollToBottom() {
            const messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
