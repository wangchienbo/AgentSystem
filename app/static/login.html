<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgentSystem - 登录</title>
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26;
            --border: #2a2a3a; --text: #e8e8f0; --text-dim: #8888a0;
            --accent: #6c5ce7; --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d68f; --danger: #ff6b6b; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .login-container {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 40px; width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-height: 100vh; max-height: 100dvh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        h1 { font-size: 24px; margin-bottom: 4px; text-align: center; }
        .subtitle { color: var(--text-dim); text-align: center; margin-bottom: 28px; font-size: 13px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-dim); }
        input {
            width: 100%; padding: 12px 14px; background: var(--surface-2);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 16px; outline: none; transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1; padding: 14px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active { opacity: 0.8; }
        .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:active { background: var(--border); }
        .error { color: var(--danger); font-size: 13px; margin-top: 12px; text-align: center; display: none; padding: 10px; background: rgba(255,107,107,0.1); border-radius: 6px; }
        .info { color: var(--text-dim); font-size: 12px; margin-top: 20px; text-align: center; line-height: 1.6; }
        .stats {
            margin-top: 14px; padding: 10px; background: var(--surface-2);
            border-radius: 8px; text-align: center; font-size: 12px; color: var(--text-dim);
        }
        .tab-bar {
            display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px;
        }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            font-size: 14px; color: var(--text-dim); border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab:active { opacity: 0.7; }
        .panel { display: none; }
        .panel.active { display: block; }
        .pw-strength {
            height: 3px; border-radius: 2px; margin-top: 6px;
            background: var(--surface-2); overflow: hidden;
        }
        .pw-strength .bar { height: 100%; width: 0; transition: all 0.3s; border-radius: 2px; }
        .pw-strength .bar.weak { width: 33%; background: var(--danger); }
        .pw-strength .bar.medium { width: 66%; background: var(--warning); }
        .pw-strength .bar.strong { width: 100%; background: var(--success); }

        @media (max-width: 480px) {
            .login-container { padding: 28px 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>✦ AgentSystem</h1>
        <p class="subtitle">App-OS 多用户平台</p>

        <div class="tab-bar">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- Login Panel -->
        <div class="panel active" id="loginPanel">
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginId">用户名</label>
                    <input type="text" id="loginId" placeholder="输入用户名" required autocomplete="username" autocapitalize="none">
                </div>
                <div class="form-group">
                    <label for="loginPw">密码</label>
                    <input type="password" id="loginPw" placeholder="输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">登录</button>
            </form>
        </div>

        <!-- Register Panel -->
        <div class="panel" id="registerPanel">
            <form id="registerForm">
                <div class="form-group">
                    <label for="regId">用户名</label>
                    <input type="text" id="regId" placeholder="起个用户名" required autocomplete="username" autocapitalize="none">
                </div>
                <div class="form-group">
                    <label for="regName">显示名称（可选）</label>
                    <input type="text" id="regName" placeholder="给自己起个名字" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="regPw">密码</label>
                    <input type="password" id="regPw" placeholder="至少4位" required autocomplete="new-password" minlength="4" oninput="checkPwStrength(this.value)">
                    <div class="pw-strength"><div class="bar" id="pwBar"></div></div>
                </div>
                <div class="form-group">
                    <label for="regPw2">确认密码</label>
                    <input type="password" id="regPw2" placeholder="再次输入密码" required autocomplete="new-password" minlength="4">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">注册并进入</button>
            </form>
        </div>

        <p class="error" id="error"></p>
        <div class="stats" id="stats">加载中...</div>
        <p class="info">
            每用户拥有独立工作空间和记忆。<br>
            用户间完全隔离，互不可见。
        </p>
    </div>

    <script>
        const API = window.location.origin;
        const errorEl = document.getElementById('error');

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
            errorEl.style.display = 'none';
        }

        function checkPwStrength(pw) {
            const bar = document.getElementById('pwBar');
            bar.className = 'bar';
            if (pw.length >= 8 && /[A-Z]/.test(pw) && /\d/.test(pw)) bar.classList.add('strong');
            else if (pw.length >= 6) bar.classList.add('medium');
            else if (pw.length > 0) bar.classList.add('weak');
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('loginId').value.trim();
            const pw = document.getElementById('loginPw').value;
            if (!userId || !pw) { showError('请输入用户名和密码'); return; }

            try {
                const r = await fetch(`${API}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, password: pw })
                });
                const data = await r.json();
                if (!r.ok) { showError(data.detail || '登录失败'); return; }
                window.location.href = `/chat/${userId}`;
            } catch (e) { showError('网络错误: ' + e.message); }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('regId').value.trim();
            const displayName = document.getElementById('regName').value.trim();
            const pw = document.getElementById('regPw').value;
            const pw2 = document.getElementById('regPw2').value;

            if (!userId) { showError('请输入用户名'); return; }
            if (pw.length < 4) { showError('密码至少4位'); return; }
            if (pw !== pw2) { showError('两次密码不一致'); return; }

            try {
                const r = await fetch(`${API}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, password: pw, display_name: displayName || userId })
                });
                const data = await r.json();
                if (!r.ok) { showError(data.detail || '注册失败'); return; }
                alert('注册成功！');
                window.location.href = `/chat/${userId}`;
            } catch (e) { showError('网络错误: ' + e.message); }
        });

        // Load stats
        fetch(`${API}/users`).then(r => r.json()).then(d => {
            document.getElementById('stats').textContent = `已有 ${d.count} 位用户`;
        }).catch(() => { document.getElementById('stats').textContent = '多用户系统'; });

        document.getElementById('loginId').focus();
    </script>
</body>
</html>
